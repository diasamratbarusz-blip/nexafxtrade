<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXAFX | Pro KES Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00ff88;
            --low-red: #ff3366;
            --neon-blue: #00d4ff;
            --bg-black: #06080a;
            --panel: #11151c;
            --gold: #ffcc00;
            --text-dim: #707a8a;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-black); color: white;
            font-family: 'Inter', sans-serif; height: 100vh;
            user-select: none; display: flex; justify-content: center; align-items: center;
        }

        .app-container {
            width: 100%; max-width: 1200px; height: 100vh; max-height: 900px;
            display: flex; flex-direction: column; background: var(--bg-black);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border-left: 1px solid #222; border-right: 1px solid #222;
            overflow: hidden; position: relative;
        }

        header {
            height: 65px; background: var(--panel); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 2px solid #222;
            z-index: 100; flex-shrink: 0;
        }

        .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--high-green); }

        .balance-container {
            background: #000; border: 1px solid var(--high-green);
            padding: 8px 20px; border-radius: 10px; text-align: right;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .balance-label { font-size: 0.65rem; color: #888; display: block; font-weight: bold; }
        .balance-val { color: var(--gold); font-family: monospace; font-size: 1.2rem; font-weight: 900; }

        #market-status-bar {
            height: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.5s; background: #1a1a1a; flex-shrink: 0;
        }
        .status-high { background: var(--high-green) !important; color: #000; box-shadow: 0 0 20px var(--high-green); }
        .status-low { background: var(--low-red) !important; color: #fff; box-shadow: 0 0 20px var(--low-red); }

        .main-layout {
            display: grid; grid-template-columns: 280px 1fr; flex: 1;
            background: #111; gap: 1px; overflow: hidden;
        }

        .side-activity { background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
        .trading-zone { 
            background: var(--bg-black); display: flex; flex-direction: column; 
            position: relative; transition: 0.5s; overflow-y: auto;
        }

        .market-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.05; transition: 0.8s; z-index: 0;
        }

        .price-hero { padding: 15px 20px; z-index: 1; display: flex; justify-content: space-between; align-items: flex-start; }
        .ticker-val { font-size: 3.2rem; font-weight: 900; font-family: 'Courier New', monospace; letter-spacing: -2px; }

        .top-graph-auth-actions { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .graph-auth-btn {
            padding: 8px 16px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase;
            border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease;
        }
        .btn-graph-login { background: transparent; color: #fff; border-color: rgba(255, 255, 255, 0.2); }
        .btn-graph-login:hover { background: rgba(255, 255, 255, 0.1); border-color: #fff; }
        .btn-graph-register { background: var(--neon-blue); color: #000; }
        .btn-graph-register:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

        .graph-top-history-ribbon {
            background: #0d1117; border-top: 1px solid #222; border-bottom: 1px solid #222;
            padding: 8px 20px; z-index: 5; display: flex; align-items: center; gap: 12px;
            min-height: 24px; overflow-x: auto; white-space: nowrap;
        }
        .history-ribbon-label {
            font-size: 0.7rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; border-right: 1px solid #333; padding-right: 10px;
        }
        .history-item-container { display: flex; align-items: center; gap: 8px; }
        .badge-won {
            background: rgba(0, 255, 136, 0.15); border: 1px solid var(--high-green); color: var(--high-green);
            padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; font-family: monospace;
        }
        .badge-lost-target {
            background: rgba(255, 51, 102, 0.15); border: 1px solid var(--low-red); color: var(--low-red);
            padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; font-family: monospace;
        }
        .history-arrow-divider { color: #444; font-size: 0.7rem; }

        #chart-container { flex: 1; min-height: 220px; padding: 0 20px; position: relative; z-index: 1; }

        .universal-action-bar {
            display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 20px; z-index: 2;
            justify-content: space-between; align-items: center; background: rgba(17, 21, 28, 0.6);
            border-bottom: 1px solid #222; border-top: 1px solid #222;
        }
        .utility-group, .account-mode-group { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; min-width: 240px; }
        .util-btn {
            flex: 1; min-width: 100px; padding: 10px 12px; font-size: 0.8rem; font-weight: 800;
            text-transform: uppercase; border-radius: 8px; cursor: pointer; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease; color: #fff;
        }
        .btn-withdraw-nav { background: #222; border-color: #444; }
        .btn-deposit-nav { background: var(--high-green); color: #000; border-color: var(--high-green); }
        .btn-how-to-trade { background: rgba(0, 212, 255, 0.05); color: var(--neon-blue); border-color: var(--neon-blue); }
        .btn-referral { background: rgba(255, 204, 0, 0.05); color: var(--gold); border-color: var(--gold); }
        
        .mode-btn {
            flex: 1; padding: 10px 12px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase;
            border-radius: 8px; cursor: pointer; text-align: center; transition: 0.2s ease;
            background: #111; color: #555; border: 1px solid #222;
        }
        .mode-btn.active-demo { background: rgba(0, 212, 255, 0.15); color: var(--neon-blue); border-color: var(--neon-blue); }
        .mode-btn.active-real { background: rgba(0, 255, 136, 0.15); color: var(--high-green); border-color: var(--high-green); }
        .util-btn:hover, .mode-btn:hover { filter: brightness(1.2); transform: translateY(-1px); }

        .live-transaction-counter {
            background: linear-gradient(90deg, rgba(17, 21, 28, 0.9) 0%, rgba(6, 8, 10, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08); border-left: 4px solid var(--neon-blue);
            border-radius: 10px; padding: 12px 20px; margin: 10px 20px 0 20px; z-index: 2;
            display: flex; justify-content: space-between; align-items: center;
        }
        .counter-details { display: flex; flex-direction: column; gap: 2px; }
        .counter-title { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .aiming-target-indicator { font-size: 0.7rem; color: var(--gold); font-weight: bold; }
        .live-running-amount { font-size: 1.5rem; font-weight: 900; font-family: monospace; color: #fff; }
        .live-running-amount.profit-reached { color: var(--high-green) !important; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .live-running-amount.loss-danger { color: var(--low-red) !important; }

        .bottom-controls {
            background: var(--panel); padding: 25px; border-top: 1px solid #333;
            display: flex; flex-direction: column; gap: 20px; z-index: 1; flex-shrink: 0;
        }

        .stake-box {
            background: #000; border: 1px solid #333; border-radius: 15px;
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
        }
        .stake-box input {
            background: transparent; border: none; color: white; font-size: 2rem;
            font-weight: 900; width: 100%; text-align: center; outline: none;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            height: 75px; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
            gap: 10px; position: relative; overflow: hidden; text-transform: uppercase;
        }
        
        .btn-buy { background: var(--high-green); color: #000; box-shadow: 0 6px 0 #008844; }
        .btn-sell { background: var(--low-red); color: #fff; box-shadow: 0 6px 0 #991133; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        .cooldown-overlay {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(0,0,0,0.4); z-index: 1; transition: none;
        }

        @media (max-width: 850px) {
            .app-container { height: 100vh; max-height: none; border: none; }
            .main-layout { grid-template-columns: 1fr; height: auto; }
            .side-activity { display: none; }
            .ticker-val { font-size: 2.2rem; }
            .universal-action-bar { flex-direction: column; gap: 12px; }
            .utility-group, .account-mode-group { width: 100%; }
            .live-transaction-counter { margin: 10px 10px 0 10px; }
            #chart-container { min-height: 200px; }
            .price-hero { flex-direction: column; gap: 10px; }
            .top-graph-auth-actions { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">NEXAFX<span>TRADE</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="audio-btn" onclick="initBeats()" style="background: var(--neon-blue); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                <i class="fas fa-play"></i> ACTIVATE SOUND
            </button>
            <div class="balance-container">
                <span class="balance-label">WALLET BALANCE</span>
                <span class="balance-val" id="balance">0.00</span>
            </div>
        </div>
    </header>

    <div id="market-status-bar">Monitoring Market Neutrality...</div>

    <div class="main-layout">
        <section class="side-activity">
            <div style="padding: 15px; background: #1c222b; font-weight: bold; font-size: 0.8rem; color: var(--high-green);">
                <i class="fas fa-broadcast-tower"></i> LIVE WITHDRAWALS
            </div>
            <div id="payout-feed" style="padding: 10px; font-size: 0.85rem; line-height: 1.8;"></div>
        </section>

        <section class="trading-zone" id="zone-bg">
            <div class="market-glow" id="market-glow"></div>
            
            <div class="price-hero">
                <div>
                    <span style="color: #666; font-size: 0.8rem; font-weight: bold;">BTC/KES REALTIME</span>
                    <div class="ticker-val" id="ticker-price">8,421,500</div>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                    <div id="market-trend" style="background: rgba(0,255,136,0.1); padding: 10px 20px; border-radius: 10px; font-weight: 900; color: var(--high-green);">
                        +0.00%
                    </div>
                    <div class="top-graph-auth-actions">
                        <button id="login-btn" class="graph-auth-btn btn-graph-login" onclick="location.href='/login'">Login</button>
                        <button id="register-btn" class="graph-auth-btn btn-graph-register" onclick="location.href='/register'">Register</button>
                    </div>
                </div>
            </div>

            <div class="graph-top-history-ribbon">
                <span class="history-ribbon-label">Position History</span>
                <div id="live-history-ribbon-content" class="history-item-container">
                    <span style="color: #444; font-size: 0.75rem;">No recent trade streams completed</span>
                </div>
            </div>

            <div class="universal-action-bar">
                <div class="utility-group">
                    <button class="util-btn btn-deposit-nav" onclick="executeDepositRoute()">Deposit</button>
                    <button class="util-btn btn-withdraw-nav" onclick="executeWithdrawalRoute()">Withdrawal</button>
                    <button class="util-btn btn-how-to-trade" onclick="toggleHowToTradeModal()">How to Trade</button>
                    <button class="util-btn btn-referral" onclick="triggerReferralSystem()">Referral</button>
                </div>
                <div class="account-mode-group">
                    <button class="mode-btn" onclick="switchAccountMode('DEMO', this)">Demo Play</button>
                    <button class="mode-btn active-real" onclick="switchAccountMode('REAL', this)">Real Play</button>
                </div>
            </div>

            <div class="live-transaction-counter">
                <div class="counter-details">
                    <span class="counter-title">Live Position Counter</span>
                    <span id="aiming-target-indicator">No active trade counting</span>
                </div>
                <div class="live-running-amount" id="live-running-amount">KES 0.00</div>
            </div>

            <div id="chart-container">
                <canvas id="liveGraph"></canvas>
            </div>

            <div class="bottom-controls">
                <div class="stake-box">
                    <span style="color: #444; font-weight: bold;">KES</span>
                    <input type="number" id="stake-amount" value="500">
                    <span style="color: var(--high-green); font-weight: bold;">STAKE</span>
                </div>
                <div class="action-btns">
                    <button class="btn btn-buy" id="buy-btn" onclick="executeBuy()">
                        <i class="fas fa-bolt"></i> BUY
                    </button>
                    <button class="btn btn-sell" id="sell-btn" disabled onclick="executeSell()">
                        <div class="cooldown-overlay" id="sell-timer-bar"></div>
                        <span id="sell-label"><i class="fas fa-hand-holding-usd"></i> SELL</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    // --- API CONFIGURATION ---
    const getApiBase = () => {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const VERCEL_BACKEND_URL = "https://nexapayfx-backend.vercel.app/api"; 
        return isLocal ? "http://localhost:5000/api" : VERCEL_BACKEND_URL;
    };

    // --- AUTHENTICATION STATE TRACKER ---
    window.USER_IS_AUTHENTICATED = false;
    window.CURRENT_ACCOUNT_MODE = "REAL";
    window.USER_TOKEN = localStorage.getItem("token");

    // --- ADMIN REMOTE CONTROL OBJECT CONFIGURATION ---
    window.NEXAFX_ADMIN_CONFIG = {
        forcedTrend: "DYNAMIC", customVolatility: null, minimumTicketPrice: 100,       
        maximumTicketPrice: 500000, profitMultiplierHigh: 1.95, profitMultiplierLow: 0.40, customTargetRatio: 1.85       
    };

    // --- APP CORE ---
    let balance = 0;
    let price = 8421500;
    let isLocked = false;
    let audioCtx = null;
    let masterGainNode = null;
    let isMarketHigh = false;
    let activeTradePosition = null;
    let tradeTicksElapsed = 0;
    let currentHighTicksLimit = 45; 

    // --- INITIALIZE APP (Fetch User Data from Vercel) ---
    async function initApp() {
        if (window.USER_TOKEN) {
            try {
                const response = await fetch(`${getApiBase()}/user/profile`, {
                    method: "GET",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${window.USER_TOKEN}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        window.USER_IS_AUTHENTICATED = true;
                        
                        // FIX: Changed from data.data.balance to data.user.balance to match backend response
                        balance = data.user?.balance || 0; 
                        updateBalance();
                        
                        // Update UI to show logged in state
                        document.getElementById('login-btn').innerText = "Logout";
                        document.getElementById('login-btn').onclick = logoutUser;
                        document.getElementById('register-btn').style.display = "none";
                    }
                } else {
                    localStorage.removeItem("token");
                    window.USER_TOKEN = null;
                }
            } catch (error) {
                console.error("Failed to fetch profile:", error);
            }
        }
        
        if (!window.USER_IS_AUTHENTICATED) {
            balance = (window.CURRENT_ACCOUNT_MODE === "DEMO") ? 100000.00 : 0.00;
            updateBalance();
        }
    }

    function logoutUser() {
        localStorage.removeItem("token");
        localStorage.removeItem("operatorName");
        localStorage.removeItem("user");
        window.location.href = "/";
    }

    // Run initialization when page loads
    window.addEventListener('DOMContentLoaded', initApp);

    // --- HIGH-QUALITY LOUD SOUND MATRIX ---
    function initBeats() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGainNode = audioCtx.createGain();
        masterGainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); 
        masterGainNode.connect(audioCtx.destination);
        document.getElementById('audio-btn').innerHTML = '<i class="fas fa-volume-up"></i> BEATS ACTIVE';
        document.getElementById('audio-btn').style.background = "var(--high-green)";
        startAfroLoop();
    }

    function playSynth(freq, type, dur, vol) {
        if(!audioCtx || !masterGainNode) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const subOsc = audioCtx.createOscillator(); 
        const gain = audioCtx.createGain();
        osc.type = type; subOsc.type = 'sine'; 
        osc.connect(gain); subOsc.connect(gain); gain.connect(masterGainNode);
        
        let targetedFreq = freq < 90 ? 100 : freq;
        let targetedSubFreq = targetedFreq / 2;
        
        osc.frequency.setValueAtTime(targetedFreq, audioCtx.currentTime);
        subOsc.frequency.setValueAtTime(targetedSubFreq, audioCtx.currentTime); 
        
        if (targetedFreq > 100) {
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            subOsc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        } else {
            osc.frequency.linearRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            subOsc.frequency.linearRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        }
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(vol * 2.0, audioCtx.currentTime + 0.005); 
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        
        osc.start(); subOsc.start();
        osc.stop(audioCtx.currentTime + dur); subOsc.stop(audioCtx.currentTime + dur);
    }

    function startAfroLoop() {
        setInterval(() => {
            if (isMarketHigh) {
                playSynth(110, 'triangle', 0.25, 0.85); 
                setTimeout(() => { if (isMarketHigh) playSynth(120, 'triangle', 0.18, 0.75); }, 250); 
            } else {
                playSynth(95, 'sine', 0.60, 0.80); 
            }
        }, 1000);
    }

    // --- GRAPH ENGINE ---
    const ctx = document.getElementById('liveGraph').getContext('2d');
    let dataPoints = Array(50).fill(price);
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataPoints.map(() => ''),
            datasets: [{
                data: dataPoints, borderColor: '#00ff88', borderWidth: 4, pointRadius: 0,
                fill: true, backgroundColor: 'rgba(0, 255, 136, 0.05)', tension: 0.3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { position: 'right', grid: { color: '#222' }, ticks: { color: '#555' } } }
        }
    });

    setInterval(() => {
        let admin = window.NEXAFX_ADMIN_CONFIG || {};
        let baseVol = isMarketHigh ? 85000 : 45000;
        const volatility = admin.customVolatility !== null && admin.customVolatility !== undefined ? admin.customVolatility : baseVol;
        const BUSINESS_GLOBAL_RISK_LIMIT = 8350000;
        let change = (Math.random() - 0.46) * (volatility / 12);
        
        if (activeTradePosition) {
            tradeTicksElapsed++;
            let currentProgressPercent = Math.min(tradeTicksElapsed / currentHighTicksLimit, 1);
            let currentMultiplierScale = 1 + (currentProgressPercent * 5.2);
            activeTradePosition.lastKnownValue = activeTradePosition.stake * currentMultiplierScale;

            if (tradeTicksElapsed <= activeTradePosition.lossTickThreshold) {
                change = Math.abs(change) + (Math.random() * 2600 + 1200);
            } else {
                change = -Math.abs(change) - (Math.random() * 5200 + 3200);
                handleTradeExpirationLoss();
                return;
            }
        }

        if (admin.forcedTrend === "BULLISH") change = Math.abs(change) + (Math.random() * 1500); 
        else if (admin.forcedTrend === "BEARISH") change = -Math.abs(change) - (Math.random() * 1500); 

        let oldPrice = price;
        price += change;

        if (price < BUSINESS_GLOBAL_RISK_LIMIT) {
            price = BUSINESS_GLOBAL_RISK_LIMIT + Math.floor(Math.random() * 5000 + 1000);
            change = price - oldPrice;
        }

        isMarketHigh = change > 0;
        const status = document.getElementById('market-status-bar');
        const glow = document.getElementById('market-glow');
        
        if (isMarketHigh) {
            status.innerText = "🔥 HIGH MARKET VOLATILITY - BULLISH MOMENTUM 🔥";
            status.className = "status-high"; glow.style.background = "var(--high-green)"; glow.style.opacity = "0.15";
            chart.data.datasets[0].borderColor = "var(--high-green)";
            playSynth(520, 'sawtooth', 0.04, 0.08); 
        } else {
            status.innerText = "❄️ LOW MARKET STRENGTH - BEARISH MOMENTUM ❄️";
            status.className = "status-low"; glow.style.background = "var(--low-red)"; glow.style.opacity = "0.15";
            chart.data.datasets[0].borderColor = "var(--low-red)";
        }

        document.getElementById('ticker-price').innerText = Math.floor(price).toLocaleString();
        document.getElementById('market-trend').innerText = (change > 0 ? '+' : '') + (change/1000).toFixed(2) + '%';
        document.getElementById('market-trend').style.color = change > 0 ? 'var(--high-green)' : 'var(--low-red)';

        dataPoints.push(price); dataPoints.shift(); chart.update('none');
        processLiveCountingTransaction();
    }, 150);

    // --- TRADE LOGIC ---
    async function executeBuy() {
        if (window.CURRENT_ACCOUNT_MODE === "REAL" && !window.USER_IS_AUTHENTICATED) {
            alert("Authentication Required: Please login or register to place bets in Real Trade.");
            window.location.href = "/login"; // FIX: Updated to clean Next.js route
            return;
        }

        let admin = window.NEXAFX_ADMIN_CONFIG || {};
        const amt = parseFloat(document.getElementById('stake-amount').value);
        
        if (amt < (admin.minimumTicketPrice || 100)) return alert("Minimum permitted ticket placement is KES " + (admin.minimumTicketPrice || 100));
        if (amt > (admin.maximumTicketPrice || 500000)) return alert("Maximum ticket exceeded. Cap: KES " + (admin.maximumTicketPrice || 500000));
        if (amt > balance) return alert("Insufficient Balance");

        // SECURE BACKEND DEDUCTION FOR REAL MODE
        if (window.CURRENT_ACCOUNT_MODE === "REAL") {
            try {
                const response = await fetch(`${getApiBase()}/user/balance`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${window.USER_TOKEN}` },
                    body: JSON.stringify({ amount: amt, action: "subtract" })
                });
                const data = await response.json();
                if (!response.ok || !data.success) return alert(data.message || "Failed to deduct balance.");
                balance = data.newBalance; // Sync exact backend balance
                updateBalance();
            } catch (error) {
                return alert("Network error while placing trade.");
            }
        } else {
            balance -= amt; updateBalance();
        }

        playSynth(180, 'sawtooth', 0.45, 0.95); 

        let chosenHighSeconds;
        let rollWeight = Math.random();
        if (rollWeight < 0.75) chosenHighSeconds = Math.random() * (10 - 5) + 5;
        else chosenHighSeconds = Math.random() * (30 - 10.01) + 10.01;
        
        currentHighTicksLimit = Math.floor((chosenHighSeconds * 1000) / 150);
        let randomLossPercentage = Math.random() * (0.95 - 0.20) + 0.20;
        let chosenLossTickThreshold = Math.floor(currentHighTicksLimit * randomLossPercentage);

        let targetedRatio = admin.customTargetRatio || 1.85;
        tradeTicksElapsed = 0;
        activeTradePosition = {
            stake: amt, entryPrice: price, targetAmount: amt * targetedRatio,
            hasSold: false, soldAmount: 0, lastKnownValue: amt, lossTickThreshold: chosenLossTickThreshold
        };

        document.getElementById('live-history-ribbon-content').innerHTML = `<span style="color: var(--neon-blue); font-size: 0.75rem; font-weight: bold;"><i class="fas fa-spinner fa-spin"></i> Stream tracking live...</span>`;

        isLocked = true;
        const buyBtn = document.getElementById('buy-btn');
        const sellBtn = document.getElementById('sell-btn');
        const bar = document.getElementById('sell-timer-bar');
        const label = document.getElementById('sell-label');

        buyBtn.disabled = true; sellBtn.disabled = true;
        bar.style.width = "100%"; bar.style.transition = "width 3s linear"; 
        
        let count = 3;
        const countdown = setInterval(() => {
            count--;
            label.innerHTML = `<i class="fas fa-lock"></i> WAIT ${count}s`;
            if (count <= 0) {
                clearInterval(countdown); isLocked = false;
                buyBtn.disabled = false; sellBtn.disabled = false;
                label.innerHTML = `<i class="fas fa-hand-holding-usd"></i> SELL`;
                bar.style.transition = "none"; bar.style.width = "0%";
                playSynth(980, 'sine', 0.15, 0.85); 
            }
        }, 1000);
        setTimeout(() => { bar.style.width = "0%"; }, 50);
    }

    async function executeSell() {
        if (window.CURRENT_ACCOUNT_MODE === "REAL" && !window.USER_IS_AUTHENTICATED) {
            alert("Authentication Required."); window.location.href = "/login"; return;
        }
        if (isLocked || !activeTradePosition || activeTradePosition.hasSold) return;
        
        let progressPercent = tradeTicksElapsed / currentHighTicksLimit;
        let multiplierScale = 1 + (progressPercent * 5.2); 
        let finalProfit = activeTradePosition.stake * multiplierScale;
        
        activeTradePosition.hasSold = true;
        activeTradePosition.soldAmount = finalProfit;

        // SECURE BACKEND ADDITION FOR REAL MODE
        if (window.CURRENT_ACCOUNT_MODE === "REAL") {
            try {
                const response = await fetch(`${getApiBase()}/user/balance`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${window.USER_TOKEN}` },
                    body: JSON.stringify({ amount: finalProfit, action: "add" })
                });
                const data = await response.json();
                if (response.ok && data.success) balance = data.newBalance;
                else balance += finalProfit; // Fallback
            } catch (error) {
                balance += finalProfit; // Fallback
            }
        } else {
            balance += finalProfit;
        }
        
        updateBalance();
        alert(`🎉 Congratulations! You won KES ${finalProfit.toFixed(2)}.`);
        addPayoutLog("User Cashout: KES " + finalProfit.toFixed(2));
        document.getElementById('sell-btn').disabled = true;
        
        document.getElementById('live-history-ribbon-content').innerHTML = `
            <span class="badge-won">WON: KES ${finalProfit.toFixed(2)}</span>
            <span class="history-arrow-divider"><i class="fas fa-chevron-right"></i></span>
            <span style="color: #888; font-size: 0.75rem; font-weight: bold;"><i class="fas fa-chart-line"></i> Tracking upper limits...</span>
        `;
        
        playSynth(1100, 'sine', 0.25, 0.95);
        setTimeout(() => { playSynth(1550, 'sine', 0.35, 1.0); }, 60);
        setTimeout(() => { playSynth(2100, 'sine', 0.45, 1.0); }, 120);
    }

    function handleTradeExpirationLoss() {
        if (!activeTradePosition) return;
        let crashValue = activeTradePosition.lastKnownValue || activeTradePosition.stake;
        const liveAmountText = document.getElementById('live-running-amount');
        const targetText = document.getElementById('aiming-target-indicator');
        const ribbonContent = document.getElementById('live-history-ribbon-content');

        if (activeTradePosition.hasSold) {
            ribbonContent.innerHTML = `
                <span class="badge-won">WON: KES ${activeTradePosition.soldAmount.toFixed(2)}</span>
                <span class="history-arrow-divider"><i class="fas fa-chevron-right"></i></span>
                <span class="badge-lost-target">CRASHED AT: KES ${crashValue.toFixed(2)}</span>
            `;
        } else {
            ribbonContent.innerHTML = `
                <span class="badge-lost-target">LOST: KES ${activeTradePosition.stake.toFixed(2)}</span>
                <span class="history-arrow-divider"><i class="fas fa-chevron-right"></i></span>
                <span class="badge-lost-target">CRASHED AT: KES ${crashValue.toFixed(2)}</span>
            `;
            if (liveAmountText) {
                liveAmountText.innerText = "KES 0.00";
                liveAmountText.className = "live-running-amount loss-danger";
            }
            alert("❌ Market Crashed. You lost, try next chance!");
        }
        
        activeTradePosition = null; tradeTicksElapsed = 0;
        if (targetText) targetText.innerText = "No active trade counting";
        playSynth(180, 'sawtooth', 0.80, 1.0); 
    }

    function updateBalance() {
        document.getElementById('balance').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function addPayoutLog(msg) {
        const feed = document.getElementById('payout-feed');
        if(!feed) return;
        const div = document.createElement('div');
        div.style.color = "var(--neon-blue)";
        div.innerHTML = `• ${msg}`;
        feed.prepend(div);
        if (feed.children.length > 15) feed.lastChild.remove();
    }

    const names = ["Amani", "Kenyatta_254", "User_77", "Trader_Leo", "Boss_Lady"];
    setInterval(() => {
        const n = names[Math.floor(Math.random() * names.length)];
        const amt = (Math.random() * 10000 + 100).toLocaleString();
        addPayoutLog(`<span style="color:#666">${n}</span> withdrew KES ${amt}`);
    }, 8000);

    function processLiveCountingTransaction() {
        const liveAmountText = document.getElementById('live-running-amount');
        const targetText = document.getElementById('aiming-target-indicator');
        const ribbonContent = document.getElementById('live-history-ribbon-content');
        if (!liveAmountText) return;

        if (activeTradePosition) {
            let progressPercent = Math.min(tradeTicksElapsed / currentHighTicksLimit, 1);
            let multiplierScale = 1 + (progressPercent * 5.2);
            let dynamicCountingValue = activeTradePosition.stake * multiplierScale;
            liveAmountText.innerText = `KES ${dynamicCountingValue.toFixed(2)}`;
            if (targetText) targetText.innerHTML = `<span style="color: var(--high-green);"><i class="fas fa-shield-alt"></i> ⚡ MARKET POSITION SECURED</span>`;

            if (!activeTradePosition.hasSold) {
                ribbonContent.innerHTML = `
                    <span style="color: #fff; font-size: 0.75rem; font-weight: bold;">CURRENT VALUE:</span>
                    <span class="badge-won" style="background: rgba(0,212,255,0.1); border-color: var(--neon-blue); color: var(--neon-blue);">KES ${dynamicCountingValue.toFixed(2)}</span>
                `;
            } else {
                ribbonContent.innerHTML = `
                    <span class="badge-won">WON: KES ${activeTradePosition.soldAmount.toFixed(2)}</span>
                    <span class="history-arrow-divider"><i class="fas fa-chevron-right"></i></span>
                    <span class="badge-lost-target">CRASHED AT: KES ${dynamicCountingValue.toFixed(2)}</span>
                `;
            }
            liveAmountText.className = dynamicCountingValue >= activeTradePosition.stake * 2 ? "live-running-amount profit-reached" : "live-running-amount";
        }
    }

    function executeWithdrawalRoute() { addPayoutLog("Initiating Secure Withdrawal Channel Sequence..."); alert("Secure Gateway Redirect:\nOpening local mobile payout ledger interface console."); }
    function executeDepositRoute() { addPayoutLog("Generating Liquidity Loading Node Credentials..."); alert("Instant Account Loading via Automated Native Node Terminals Access Granted."); }
    function toggleHowToTradeModal() { alert("Quick-Start Tutorial Guide:\n1. Input your custom stake.\n2. Tap BUY to open a position.\n3. Watch the Live Counter increase.\n4. Tap SELL before the crash!"); }
    function triggerReferralSystem() {
        const simulatedRefLink = "https://nexafxtrade.vercel.app/invite?code=" + Math.floor(Math.random() * 90000 + 10000);
        alert("Your Exclusive Referral Network URL Token:\n" + simulatedRefLink);
        addPayoutLog("Referral metadata sequence exported.");
    }

    function switchAccountMode(mode, currentBtn) {
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active-demo', 'active-real'));
        if (mode === 'DEMO') {
            currentBtn.classList.add('active-demo');
            window.CURRENT_ACCOUNT_MODE = "DEMO";
            balance = 100000.00;
            addPayoutLog("Switched to Training Simulator (Demo Play).");
        } else {
            currentBtn.classList.add('active-real');
            window.CURRENT_ACCOUNT_MODE = "REAL";
            balance = window.USER_IS_AUTHENTICATED ? balance : 0.00;
            addPayoutLog("Switched to Production Vault (Real Play).");
        }
        updateBalance();
    }
</script>
</body>
</html>
