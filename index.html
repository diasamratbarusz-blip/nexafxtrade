<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXAFX | Pro KES Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00ff88;
            --low-red: #ff3366;
            --neon-blue: #00d4ff;
            --bg-black: #06080a;
            --panel: #11151c;
            --gold: #ffcc00;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-black); color: white;
            font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* --- Header Section --- */
        header {
            height: 65px; background: var(--panel); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 2px solid #222;
            z-index: 100;
        }

        .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--high-green); }

        .balance-container {
            background: #000; border: 1px solid var(--high-green);
            padding: 8px 20px; border-radius: 10px; text-align: right;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .balance-label { font-size: 0.65rem; color: #888; display: block; font-weight: bold; }
        .balance-val { color: var(--gold); font-family: monospace; font-size: 1.2rem; font-weight: 900; }

        /* --- Momentum Status Banner --- */
        #market-status-bar {
            height: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.5s; background: #1a1a1a;
        }
        .status-high { background: var(--high-green) !important; color: #000; box-shadow: 0 0 20px var(--high-green); }
        .status-low { background: var(--low-red) !important; color: #fff; box-shadow: 0 0 20px var(--low-red); }

        /* --- Layout --- */
        main {
            display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 95px);
            background: #111; gap: 1px;
        }

        .side-activity { background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
        .trading-zone { 
            background: var(--bg-black); display: flex; flex-direction: column; 
            position: relative; transition: 0.5s; 
        }

        /* Dynamic Background Glow for High/Low Market */
        .market-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.05; transition: 0.8s; z-index: 0;
        }

        /* --- Price Display --- */
        .price-hero { padding: 20px; z-index: 1; display: flex; justify-content: space-between; align-items: flex-start; }
        .ticker-val { font-size: 3.2rem; font-weight: 900; font-family: 'Courier New', monospace; letter-spacing: -2px; }

        /* --- Chart Wrapper --- */
        #chart-container { flex: 1; padding: 0 20px; position: relative; z-index: 1; }

        /* --- Trade Desktop --- */
        .bottom-controls {
            background: var(--panel); padding: 25px; border-top: 1px solid #333;
            display: flex; flex-direction: column; gap: 20px; z-index: 1;
        }

        .stake-box {
            background: #000; border: 1px solid #333; border-radius: 15px;
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
        }
        .stake-box input {
            background: transparent; border: none; color: white; font-size: 2rem;
            font-weight: 900; width: 100%; text-align: center; outline: none;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            height: 75px; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
            gap: 10px; position: relative; overflow: hidden; text-transform: uppercase;
        }
        
        .btn-buy { background: var(--high-green); color: #000; box-shadow: 0 6px 0 #008844; }
        .btn-sell { background: var(--low-red); color: #fff; box-shadow: 0 6px 0 #991133; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        /* 5-Second Cooldown Bar */
        .cooldown-overlay {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(0,0,0,0.4); z-index: 1; transition: none;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 850px) {
            main { grid-template-columns: 1fr; }
            .side-activity { display: none; }
            .ticker-val { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">NEXAFX<span>TRADE</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button id="audio-btn" onclick="initBeats()" style="background: var(--neon-blue); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
            <i class="fas fa-play"></i> ACTIVATE SOUND
        </button>
        <div class="balance-container">
            <span class="balance-label">WALLET BALANCE</span>
            <span class="balance-val" id="balance">1,450,000.00</span>
        </div>
    </div>
</header>

<div id="market-status-bar">Monitoring Market Neutrality...</div>

<main>
    <section class="side-activity">
        <div style="padding: 15px; background: #1c222b; font-weight: bold; font-size: 0.8rem; color: var(--high-green);">
            <i class="fas fa-broadcast-tower"></i> LIVE WITHDRAWALS
        </div>
        <div id="payout-feed" style="padding: 10px; font-size: 0.85rem; line-height: 1.8;"></div>
    </section>

    <section class="trading-zone" id="zone-bg">
        <div class="market-glow" id="market-glow"></div>
        
        <div class="price-hero">
            <div>
                <span style="color: #666; font-size: 0.8rem; font-weight: bold;">BTC/KES REALTIME</span>
                <div class="ticker-val" id="ticker-price">8,421,500</div>
            </div>
            <div id="market-trend" style="background: rgba(0,255,136,0.1); padding: 10px 20px; border-radius: 10px; font-weight: 900; color: var(--high-green);">
                +0.00%
            </div>
        </div>

        <div id="chart-container">
            <canvas id="liveGraph"></canvas>
        </div>

        <div class="bottom-controls">
            <div class="stake-box">
                <span style="color: #444; font-weight: bold;">KES</span>
                <input type="number" id="stake-amount" value="500">
                <span style="color: var(--high-green); font-weight: bold;">STAKE</span>
            </div>
            <div class="action-btns">
                <button class="btn btn-buy" id="buy-btn" onclick="executeBuy()">
                    <i class="fas fa-bolt"></i> BUY
                </button>
                <button class="btn btn-sell" id="sell-btn" disabled onclick="executeSell()">
                    <div class="cooldown-overlay" id="sell-timer-bar"></div>
                    <span id="sell-label"><i class="fas fa-hand-holding-usd"></i> SELL</span>
                </button>
            </div>
        </div>
    </section>
</main>

<script>
    // --- APP CORE ---
    let balance = 1450000;
    let price = 8421500;
    let isLocked = false;
    let audioCtx = null;
    let isMarketHigh = false;

    // --- BEAST AUDIO ENGINE ---
    function initBeats() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('audio-btn').innerHTML = '<i class="fas fa-volume-up"></i> BEATS ACTIVE';
        document.getElementById('audio-btn').style.background = "var(--high-green)";
        startAfroLoop();
    }

    function playSynth(freq, type, dur, vol) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function startAfroLoop() {
        // Dynamic Bassline based on Market state
        setInterval(() => {
            if (isMarketHigh) {
                // Fast aggressive kick for HIGH market
                playSynth(65, 'sine', 0.3, 0.4); 
                setTimeout(() => playSynth(65, 'sine', 0.3, 0.4), 250); 
            } else {
                // Deep slow pulse for LOW market
                playSynth(45, 'sine', 0.8, 0.3);
            }
        }, 1000);
    }

    // --- GRAPH ENGINE ---
    const ctx = document.getElementById('liveGraph').getContext('2d');
    let dataPoints = Array(50).fill(price);
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataPoints.map(() => ''),
            datasets: [{
                data: dataPoints,
                borderColor: '#00ff88',
                borderWidth: 4,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(0, 255, 136, 0.05)',
                tension: 0.3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 0 },
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { position: 'right', grid: { color: '#222' }, ticks: { color: '#555' } } }
        }
    });

    // Market Generator (High Speed Jitter)
    setInterval(() => {
        const volatility = isMarketHigh ? 25000 : 8000;
        const change = (Math.random() - 0.48) * (volatility / 15);
        price += change;

        // Determine Market State
        isMarketHigh = change > 0;
        const status = document.getElementById('market-status-bar');
        const glow = document.getElementById('market-glow');
        
        if (isMarketHigh) {
            status.innerText = "🔥 HIGH MARKET VOLATILITY - BULLISH MOMENTUM 🔥";
            status.className = "status-high";
            glow.style.background = "var(--high-green)";
            glow.style.opacity = "0.15";
            chart.data.datasets[0].borderColor = "var(--high-green)";
            playSynth(400, 'triangle', 0.1, 0.02); // Ticker sound
        } else {
            status.innerText = "❄️ LOW MARKET STRENGTH - BEARISH MOMENTUM ❄️";
            status.className = "status-low";
            glow.style.background = "var(--low-red)";
            glow.style.opacity = "0.15";
            chart.data.datasets[0].borderColor = "var(--low-red)";
        }

        document.getElementById('ticker-price').innerText = Math.floor(price).toLocaleString();
        document.getElementById('market-trend').innerText = (change > 0 ? '+' : '') + (change/1000).toFixed(2) + '%';
        document.getElementById('market-trend').style.color = change > 0 ? 'var(--high-green)' : 'var(--low-red)';

        dataPoints.push(price);
        dataPoints.shift();
        chart.update('none');
    }, 150);

    // --- TRADE LOGIC ---
    function executeBuy() {
        const amt = parseFloat(document.getElementById('stake-amount').value);
        if (amt > balance) return alert("Insufficient Balance");

        balance -= amt;
        updateBalance();
        playSynth(100, 'sine', 1, 0.6); // Impact sound

        // LOCK SELL BUTTON FOR 5s
        isLocked = true;
        const buyBtn = document.getElementById('buy-btn');
        const sellBtn = document.getElementById('sell-btn');
        const bar = document.getElementById('sell-timer-bar');
        const label = document.getElementById('sell-label');

        buyBtn.disabled = true;
        sellBtn.disabled = true;
        bar.style.width = "100%";
        bar.style.transition = "width 5s linear";
        
        let count = 5;
        const countdown = setInterval(() => {
            count--;
            label.innerHTML = `<i class="fas fa-lock"></i> WAIT ${count}s`;
            if (count <= 0) {
                clearInterval(countdown);
                isLocked = false;
                buyBtn.disabled = false;
                sellBtn.disabled = false;
                label.innerHTML = `<i class="fas fa-hand-holding-usd"></i> SELL`;
                bar.style.transition = "none";
                bar.style.width = "0%";
                playSynth(800, 'sine', 0.1, 0.2); // Unlock sound
            }
        }, 1000);

        setTimeout(() => { bar.style.width = "0%"; }, 50);
    }

    function executeSell() {
        if (isLocked) return;
        const amt = parseFloat(document.getElementById('stake-amount').value);
        const profit = isMarketHigh ? amt * 1.95 : amt * 0.4; // High market pays more
        balance += profit;
        updateBalance();
        
        // Success Sound
        playSynth(1000, 'sine', 0.2, 0.2);
        setTimeout(() => playSynth(1500, 'sine', 0.3, 0.2), 100);
        
        addPayoutLog(`User Cashout: KES ${profit.toFixed(2)}`);
    }

    function updateBalance() {
        document.getElementById('balance').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function addPayoutLog(msg) {
        const feed = document.getElementById('payout-feed');
        const div = document.createElement('div');
        div.style.color = "var(--neon-blue)";
        div.innerHTML = `• ${msg}`;
        feed.prepend(div);
        if (feed.children.length > 15) feed.lastChild.remove();
    }

    // Fake Social Proof
    const names = ["Amani", "Kenyatta_254", "User_77", "Trader_Leo", "Boss_Lady"];
    setInterval(() => {
        const n = names[Math.floor(Math.random() * names.length)];
        const amt = (Math.random() * 10000 + 100).toLocaleString();
        addPayoutLog(`<span style="color:#666">${n}</span> withdrew KES ${amt}`);
    }, 8000);

</script>
</body>
    </html>
