<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexafxtrade | Buy Low Sell High</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="main-header">
            <div class="brand">Nexafxtrade</div>
            <div class="nav-controls">
                <div class="balance-box">
                    <span class="label">KES</span>
                    <span id="user-balance" class="value">0.00</span>
                </div>
                <button class="btn-deposit">Deposit</button>
                <button class="btn-withdraw">Withdraw</button>
                <div class="menu-icon">☰</div>
            </div>
        </header>

        <main class="content-grid">
            <!-- Live Activity Sidebar -->
            <section class="chat-section">
                <div class="chat-header">Chat</div>
                <div id="chat-feed" class="chat-body">
                    <!-- Notifications will appear here -->
                </div>
                <div class="chat-input">
                    <input type="text" placeholder="Write your message!">
                    <button>SEND</button>
                </div>
            </section>

            <!-- Trading Center -->
            <section class="trade-section">
                <div class="rate-overlay">Rate: <span id="current-rate">0.0331</span></div>
                <div class="chart-container">
                    <canvas id="tradeChart"></canvas>
                </div>

                <div class="trade-controls">
                    <div class="amount-input-row">
                        <button class="adj-btn">-</button>
                        <input type="number" id="trade-amount" value="100">
                        <button class="adj-btn">+</button>
                        <button class="x2-btn">x2</button>
                    </div>
                    <div class="quick-sums">
                        <button onclick="setSum(100)">100</button>
                        <button onclick="setSum(200)">200</button>
                        <button onclick="setSum(500)">500</button>
                    </div>
                    <div class="action-buttons">
                        <button id="buy-btn" class="buy-btn">BUY</button>
                        <button id="sell-btn" class="sell-btn">SELL</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="legal-footer">
            <p>Nexafxtrade is a registered entity. Located at Binaa Mall, 2nd Floor, Langata Rd, Nairobi.</p>
            <p>Support: support@unasemeje.com | &copy; 2026 Nexafxtrade. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
