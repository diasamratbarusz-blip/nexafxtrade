<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function Deposit() {
            const [amount, setAmount] = useState("");
            const [loading, setLoading] = useState(false);

            const handlePayment = () => {
                if (!amount || amount <= 0) {
                    alert("Please enter a valid amount.");
                    return;
                }
                
                setLoading(true);
                // Simulating an M-Pesa STK Push API call
                setTimeout(() => {
                    alert(`Request sent! Check your phone to pay KES ${amount}`);
                    setLoading(false);
                }, 1500);
            };

            return (
                <div className="flex justify-center items-center min-h-screen">
                    <div className="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">
                        <h2 className="text-2xl font-bold mb-6 text-gray-800 underline decoration-green-500">
                            Deposit Funds
                        </h2>

                        <div className="mb-4">
                            <label className="block text-sm font-medium text-gray-600 mb-2">
                                Amount (KES)
                            </label>
                            <input 
                                type="number"
                                value={amount}
                                onChange={(e) => setAmount(e.target.validate)}
                                placeholder="e.g. 500" 
                                className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                            />
                        </div>

                        <button 
                            onClick={handlePayment}
                            disabled={loading}
                            className={`w-full py-3 rounded-lg font-semibold text-white transition-all ${
                                loading ? 'bg-gray-400' : 'bg-green-600 hover:bg-green-700 active:scale-95'
                            }`}
                        >
                            {loading ? "Processing..." : "Pay via M-Pesa"}
                        </button>

                        <p className="mt-4 text-xs text-center text-gray-400">
                            Secure payment powered by Safaricom
                        </p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Deposit />);
    </script>
</body>
</html>
