<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXAFX | Register Terminal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00ff88;
            --neon-blue: #00d4ff;
            --bg-black: #06090f;
            --panel: #11171f;
            --text-dim: #707a8a;
            --error-red: #ff5252;
        }

        body, html {
            margin: 0; padding: 0; 
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .auth-card {
            background-color: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-title {
            color: var(--high-green);
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin: 0;
        }

        .brand-title span { color: var(--neon-blue); }

        .auth-subtitle {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #444;
            font-size: 0.9rem;
        }

        .auth-input {
            width: 100%;
            background-color: #06080a;
            border: 1px solid #222;
            color: white;
            padding: 12px 14px 12px 45px;
            font-size: 0.95rem;
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .auth-input:focus { border-color: var(--neon-blue); }

        .btn-auth-submit {
            width: 100%;
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-auth-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .status-message {
            margin-top: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            font-family: 'Courier New', monospace;
            min-height: 20px;
            line-height: 1.4;
        }

        .auth-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .link-text { color: var(--neon-blue); font-weight: 700; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="brand-title">NEXAFX<span>TRADE</span></h1>
            <div class="auth-subtitle">Initialize Account Terminal</div>
        </div>

        <div class="form-group">
            <i class="fas fa-user"></i>
            <input type="text" id="name" class="auth-input" placeholder="Full Operator Name">
        </div>

        <div class="form-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" class="auth-input" placeholder="Registered Email Address">
        </div>

        <div class="form-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="phone" class="auth-input" placeholder="Phone (e.g., 254...)">
        </div>

        <div class="form-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" class="auth-input" placeholder="Secure Access Password">
        </div>

        <div class="form-group">
            <i class="fas fa-shield-alt"></i>
            <input type="password" id="confirmPassword" class="auth-input" placeholder="Confirm Access Password">
        </div>

        <button id="registerBtn" class="btn-auth-submit" onclick="handleRegister()">
            REGISTER TERMINAL
        </button>

        <div id="statusMsg" class="status-message"></div>

        <div class="auth-footer">
            Already have an active node? 
            <a href="login.html" class="link-text">Access Vault</a>
        </div>
    </div>
</div>

<script>
    /**
     * DYNAMIC API CONFIGURATION
     * Updated to point to your new Vercel Backend!
     */
    const getApiBase = () => {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        
        // Your new Vercel Backend URL
        return isLocal 
            ? "http://localhost:5000/api" 
            : "https://nexapayfx-backend.vercel.app/api"; 
    };

    async function handleRegister() {
        // Added .trim() to remove accidental spaces
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const statusEl = document.getElementById('statusMsg');
        const registerBtn = document.getElementById('registerBtn');

        // Reset display
        statusEl.style.color = "var(--neon-blue)";
        
        // 1. Core Validation
        if (!name || !email || !phone || !password || !confirmPassword) {
            statusEl.innerText = "⚠️ ALL CREDENTIAL MODULES REQUIRED.";
            statusEl.style.color = "var(--error-red)";
            return;
        }

        if (password !== confirmPassword) {
            statusEl.innerText = "❌ PASSWORDS DO NOT MATCH.";
            statusEl.style.color = "var(--error-red)";
            return;
        }

        // Lock UI
        statusEl.innerText = "SYNCHRONIZING WITH SERVER...";
        registerBtn.disabled = true;

        try {
            const api_url = `${getApiBase()}/auth/register`;
            
            const response = await fetch(api_url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, phone, password })
            });

            const data = await response.json();

            if (response.ok) {
                statusEl.innerText = "REGISTRATION AUTHORIZED. SECURING NODE...";
                statusEl.style.color = "var(--high-green)";
                
                // Save JWT for session persistence
                if(data.token) {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("operatorName", name);
                }
                
                // Go to the dashboard
                setTimeout(() => window.location.href = "dashboard.html", 1500);
            } else {
                throw new Error(data.message || "TERMINAL REJECTED CREDENTIALS");
            }
        } catch (error) {
            console.error("Auth Error:", error);
            
            if (error.message.includes("Failed to fetch")) {
                statusEl.innerText = "❌ CONNECTION FAILED: CHECK SERVER/CORS.";
            } else {
                statusEl.innerText = `❌ ERROR: ${error.message.toUpperCase()}`;
            }
            
            statusEl.style.color = "var(--error-red)";
            registerBtn.disabled = false;
        }
    }
</script>

</body>
</html>
