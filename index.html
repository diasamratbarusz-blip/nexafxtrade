<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexaPayFX Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      margin: 10px;
      display: inline-block;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>NexaPayFX Dashboard</h1>
  <p>Welcome (Guest Mode)</p>
</header>

<div class="container">

  <div class="card">
    <h2>Account Status</h2>
    <p>You are currently not logged in.</p>

    <a href="login.html"><button>Login</button></a>
    <a href="register.html"><button>Register</button></a>
  </div>

  <div class="card">
    <h2>Market Overview</h2>
    <p>Forex trading dashboard preview...</p>
  </div>

</div>

</html>
