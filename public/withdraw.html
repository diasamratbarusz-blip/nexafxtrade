<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Withdrawal Terminal | NEXAFX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00ff88;
            --neon-blue: #00d4ff;
            --bg-black: #06090f;
            --panel: #11171f;
            --text-dim: #707a8a;
            --error-red: #ff5252;
            --gold: #ffcc00;
            --border-light: rgba(255, 255, 255, 0.05);
            --input-bg: #06080a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-black); color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(17, 23, 31, 0.98); border-bottom: 2px solid var(--border-light); }
        .logo { color: white; font-family: 'Outfit'; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; text-decoration: none; }
        .logo span { color: var(--neon-blue); }

        .wallet-container { background: #000; border: 1px solid var(--neon-blue); padding: 8px 15px; border-radius: 10px; text-align: right; }
        .wallet-select { background: transparent; color: var(--neon-blue); border: none; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .wallet-val { color: var(--gold); font-family: monospace; font-size: 1.1rem; font-weight: 900; display: block; }

        .main-content { padding: 50px 20px; max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; gap: 40px; }
        .terminal-card { background: var(--panel); width: 100%; max-width: 500px; border-radius: 24px; padding: 40px; border: 1px solid var(--border-light); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 10px; font-weight: 800; color: var(--neon-blue); text-transform: uppercase; }
        .auth-input, .auth-select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #222c3a; background: var(--input-bg); color: #fff; font-size: 14px; }

        .btn-submit { width: 100%; background: var(--gold); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .status-message { margin-top: 20px; font-size: 0.8rem; text-align: center; font-weight: 700; }
    </style>
</head>
<body>

<nav>
    <a href="/dashboard" class="logo">NEXA<span>TRADE</span></a>
    <div class="wallet-container">
        <select id="currencySelector" class="wallet-select" onchange="updateBalanceDisplay()">
            <option value="USD">USD Account</option>
            <option value="EUR">EUR Account</option>
            <option value="GBP">GBP Account</option>
            <option value="USDT">USDT Wallet</option>
        </select>
        <span class="wallet-val" id="nav-balance">0.00</span>
    </div>
</nav>

<section class="main-content">
    <div class="terminal-card">
        <div class="form-group">
            <label>Transfer Method</label>
            <select id="method" class="auth-select">
                <option value="bank">SWIFT / Wire Transfer</option>
                <option value="crypto">Crypto Wallet (TRC20/ERC20)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Amount to Withdraw</label>
            <input type="number" id="amount" class="auth-input" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Recipient Details / Wallet Address</label>
            <input type="text" id="recipient" class="auth-input" placeholder="Enter IBAN or Crypto Address">
        </div>
        <button id="submitBtn" class="btn-submit" onclick="processWithdrawal()">Execute Transfer</button>
        <div id="statusMsg" class="status-message"></div>
    </div>
</section>

<script>
    // Mock balances for multi-currency
    const balances = { USD: 15420.50, EUR: 12100.00, GBP: 9800.75, USDT: 25000.00 };

    function updateBalanceDisplay() {
        const currency = document.getElementById('currencySelector').value;
        document.getElementById('nav-balance').innerText = `${balances[currency].toLocaleString()} ${currency}`;
    }

    async function processWithdrawal() {
        const currency = document.getElementById('currencySelector').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const statusEl = document.getElementById('statusMsg');

        if (amount > balances[currency]) {
            statusEl.innerText = "❌ INSUFFICIENT FUNDS IN " + currency + " ACCOUNT.";
            statusEl.style.color = "var(--error-red)";
            return;
        }

        statusEl.innerText = "PROCESSING " + currency + " TRANSACTION...";
        statusEl.style.color = "var(--neon-blue)";
        
        // Logic remains connected to your existing API structures
        setTimeout(() => {
            statusEl.innerText = "✅ TRANSACTION QUEUED SUCCESSFULLY.";
            statusEl.style.color = "var(--high-green)";
        }, 2000);
    }

    window.onload = updateBalanceDisplay;
</script>
</body>
</html>
