<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXAFX | Institutional Forex Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00e676;
            --low-red: #ff1744;
            --neon-blue: #00b0ff;
            --bg-black: #0a0e12;
            --panel: #121820;
            --panel-light: #1a222d;
            --gold: #ffd600;
            --text-dim: #90a4ae;
            --border-color: #232f3e;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-black); color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif; height: 100vh;
            user-select: none; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 1400px; height: 100vh; max-height: 950px;
            display: flex; flex-direction: column; background: var(--bg-black);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color); overflow: hidden; position: relative;
        }

        header {
            height: 65px; background: var(--panel); display: flex; align-items: center;
            justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border-color);
            z-index: 100; flex-shrink: 0;
        }

        .brand { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        .brand span { color: var(--neon-blue); }

        .header-actions { display: flex; align-items: center; gap: 16px; }

        .balance-container {
            background: #000000; border: 1px solid var(--border-color);
            padding: 6px 16px; border-radius: 8px; text-align: right;
        }
        .balance-label { font-size: 0.65rem; color: var(--text-dim); display: block; font-weight: 700; letter-spacing: 0.5px; }
        .balance-val { color: var(--high-green); font-family: monospace; font-size: 1.15rem; font-weight: 800; }

        #market-status-bar {
            height: 28px; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.5px; background: #070a0e; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .status-high { color: var(--high-green); }
        .status-low { color: var(--low-red); }

        .main-layout {
            display: grid; grid-template-columns: 280px 1fr; flex: 1;
            background: var(--border-color); gap: 1px; overflow: hidden;
        }

        .side-activity { background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
        
        .pair-selector-title {
            padding: 14px 20px; font-weight: 800; font-size: 0.75rem; color: var(--text-dim);
            letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border-color);
        }

        .pair-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .pair-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; border-bottom: 1px solid rgba(35, 47, 62, 0.4);
            cursor: pointer; transition: background 0.2s;
        }
        .pair-row:hover, .pair-row.active { background: var(--panel-light); }
        .pair-name { font-weight: 700; font-size: 0.9rem; }
        .pair-price { font-family: monospace; font-weight: 700; font-size: 0.9rem; }
        
        .trading-zone { 
            background: var(--bg-black); display: flex; flex-direction: column; 
            position: relative; overflow: hidden;
        }

        .price-hero { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .active-pair-display { font-size: 1.4rem; font-weight: 800; color: #fff; }
        .ticker-val { font-size: 2.8rem; font-weight: 800; font-family: monospace; letter-spacing: -1px; margin-top: 4px; }

        .top-graph-auth-actions { display: flex; gap: 8px; align-items: center; }
        .graph-auth-btn {
            padding: 8px 16px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
        }
        .btn-graph-login { background: transparent; color: #fff; border-color: var(--border-color); }
        .btn-graph-login:hover { background: var(--panel-light); }
        .btn-graph-register { background: var(--neon-blue); color: #000; }
        .btn-graph-register:hover { filter: brightness(1.1); }

        #chart-container { flex: 1; min-height: 250px; padding: 20px; position: relative; }

        .universal-action-bar {
            display: flex; gap: 10px; padding: 12px 20px;
            justify-content: space-between; align-items: center; background: var(--panel);
            border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
        }
        .utility-group, .account-mode-group { display: flex; gap: 8px; }
        .util-btn {
            padding: 8px 14px; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; border-radius: 6px; cursor: pointer;
            border: 1px solid var(--border-color); background: var(--panel-light); color: #fff; transition: 0.2s;
        }
        .util-btn:hover { background: #243142; }
        
        .mode-btn {
            padding: 8px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            border-radius: 6px; cursor: pointer; background: #000; color: #555; border: 1px solid var(--border-color);
        }
        .mode-btn.active-demo { color: var(--neon-blue); border-color: var(--neon-blue); }
        .mode-btn.active-real { color: var(--high-green); border-color: var(--high-green); }

        /* Real Forex Open Positions Grid System */
        .positions-terminal {
            height: 160px; background: var(--panel); border-top: 1px solid var(--border-color);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .terminal-header {
            padding: 10px 20px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase; color: var(--text-dim); background: #0e131a;
            border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between;
        }
        .positions-log { flex: 1; overflow-y: auto; font-size: 0.8rem; font-family: monospace; }
        .position-item {
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); align-items: center;
        }
        .pos-buy { color: var(--high-green); }
        .pos-sell { color: var(--low-red); }

        .bottom-controls {
            background: var(--panel); padding: 20px 24px; border-top: 1px solid var(--border-color);
            display: grid; grid-template-columns: 1fr 2fr; gap: 24px; align-items: center; flex-shrink: 0;
        }

        .lot-management-box {
            background: #000000; border: 1px solid var(--border-color); border-radius: 8px;
            padding: 10px 16px; display: flex; flex-direction: column; gap: 4px;
        }
        .lot-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; letter-spacing: 0.5px; }
        .lot-input-wrapper { display: flex; align-items: center; justify-content: space-between; }
        .lot-input-wrapper input {
            background: transparent; border: none; color: white; font-size: 1.5rem;
            font-weight: 800; font-family: monospace; width: 100%; outline: none; text-align: left;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn {
            height: 55px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center;
            gap: 10px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-buy { background: var(--high-green); color: #000000; }
        .btn-sell { background: var(--low-red); color: #ffffff; }
        .btn:active { transform: scale(0.98); }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .side-activity { display: none; }
            .bottom-controls { grid-template-columns: 1fr; gap: 12px; }
            .ticker-val { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">NEXAFX<span>HQ</span></div>
        <div class="header-actions">
            <div class="balance-container">
                <span class="balance-label">MARGIN BALANCE (KES)</span>
                <span class="balance-val" id="balance">1,500,000.00</span>
            </div>
        </div>
    </header>

    <div id="market-status-bar" class="status-high">Institutional Liquidity Feed Connected</div>

    <div class="main-layout">
        <!-- Professional Market Watch List -->
        <section class="side-activity">
            <div class="pair-selector-title"><i class="fas fa-chart-bar"></i> Market Watch</div>
            <div class="pair-list" id="forex-pair-list">
                <!-- Programmatically populated for high accuracy -->
            </div>
        </section>

        <section class="trading-zone">
            <div class="price-hero">
                <div>
                    <span class="active-pair-display" id="current-pair-title">EUR/USD</span>
                    <div class="ticker-val" id="ticker-price">1.08524</div>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
                    <div id="market-trend" style="font-weight: 800; font-size: 1rem; color: var(--high-green);">
                        +0.04%
                    </div>
                    <div class="top-graph-auth-actions">
                        <button id="login-btn" class="graph-auth-btn btn-graph-login" onclick="location.href='login.html'">Gateway Login</button>
                        <button id="register-btn" class="graph-auth-btn btn-graph-register" onclick="location.href='register.html'">Register Account</button>
                    </div>
                </div>
            </div>

            <div class="universal-action-bar">
                <div class="utility-group">
                    <button class="util-btn" onclick="executeDepositRoute()">Deposit</button>
                    <button class="util-btn" onclick="executeWithdrawalRoute()">Withdrawal</button>
                </div>
                <div class="account-mode-group">
                    <button class="mode-btn active-demo" onclick="switchAccountMode('DEMO', this)">Demo Ledger</button>
                    <button class="mode-btn" onclick="switchAccountMode('REAL', this)">Live Server</button>
                </div>
            </div>

            <!-- Core Technical Chart Rendering Space -->
            <div id="chart-container">
                <canvas id="liveGraph"></canvas>
            </div>

            <!-- Open Positions Terminal Log -->
            <div class="positions-terminal">
                <div class="terminal-header">
                    <span><i class="fas fa-folder-open"></i> Active Market Positions</span>
                    <span>Running Floating PnL</span>
                </div>
                <div class="positions-log" id="open-positions-log">
                    <!-- Dynamic trading metrics insert layout -->
                </div>
            </div>

            <div class="bottom-controls">
                <div class="lot-management-box">
                    <span class="lot-label">VOLUME (LOTS)</span>
                    <div class="lot-input-wrapper">
                        <input type="number" id="lot-size" value="1.00" step="0.1" min="0.01">
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn btn-buy" id="buy-btn" onclick="openForexOrder('BUY')">
                        <i class="fas fa-arrow-up"></i> BUY / LONG
                    </button>
                    <button class="btn btn-sell" id="sell-btn" onclick="openForexOrder('SELL')">
                        <i class="fas fa-arrow-down"></i> SELL / SHORT
                    </button>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    const getApiBase = () => {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        return isLocal ? "http://localhost:5000/api" : "https://nexapayfx-backend.vercel.app/api";
    };

    window.USER_IS_AUTHENTICATED = false;
    window.CURRENT_ACCOUNT_MODE = "DEMO";
    window.USER_TOKEN = localStorage.getItem("token");

    // Institutional Forex Market Catalog Architecture
    let forexMarkets = {
        "EUR/USD": { price: 1.08520, digits: 5, change: 0.02 },
        "GBP/USD": { price: 1.26440, digits: 5, change: -0.05 },
        "USD/JPY": { price: 151.420, digits: 3, change: 0.12 },
        "AUD/USD": { price: 0.65310, digits: 5, change: -0.01 }
    };
    let activePair = "EUR/USD";
    let marginBalance = 1500000.00;
    let openPositions = [];

    // Initialize Forex Pair Panels UI
    function renderMarketWatch() {
        const container = document.getElementById('forex-pair-list');
        container.innerHTML = '';
        Object.keys(forexMarkets).forEach(pair => {
            const data = forexMarkets[pair];
            const div = document.createElement('div');
            div.className = `pair-row ${pair === activePair ? 'active' : ''}`;
            div.onclick = () => selectForexPair(pair);
            div.innerHTML = `
                <span class="pair-name">${pair}</span>
                <span class="pair-price" id="watch-${pair}">${data.price.toFixed(data.digits)}</span>
            `;
            container.appendChild(div);
        });
    }

    function selectForexPair(pair) {
        activePair = pair;
        document.getElementById('current-pair-title').innerText = pair;
        renderMarketWatch();
        // Clear graph variables matching historical constraints
        dataPoints = Array(40).fill(forexMarkets[pair].price);
        chart.data.datasets[0].data = dataPoints;
    }

    // Chart Setup Engine
    const ctx = document.getElementById('liveGraph').getContext('2d');
    let dataPoints = Array(40).fill(forexMarkets[activePair].price);
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataPoints.map(() => ''),
            datasets: [{
                data: dataPoints, borderColor: '#00e676', borderWidth: 2, pointRadius: 0,
                fill: false, tension: 0.1
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { legend: false },
            scales: { x: { display: false }, y: { position: 'right', grid: { color: '#161f2b' }, ticks: { color: '#556a85' } } }
        }
    });

    // Realtime High-Performance Tick Stream Simulation Engine
    setInterval(() => {
        Object.keys(forexMarkets).forEach(pair => {
            let item = forexMarkets[pair];
            let pipMovement = (Math.random() - 0.5) * (pair === "USD/JPY" ? 0.04 : 0.0003);
            item.price += pipMovement;
            
            // Render update inside watch row mapping metrics matrix
            const element = document.getElementById(`watch-${pair}`);
            if(element) element.innerText = item.price.toFixed(item.digits);
        });

        // Track running statistics for active dashboard selection
        let activeObj = forexMarkets[activePair];
        document.getElementById('ticker-price').innerText = activeObj.price.toFixed(activeObj.digits);
        
        dataPoints.push(activeObj.price);
        dataPoints.shift();
        chart.update('none');

        calculateFloatingPnL();
    }, 400);

    // Dynamic execution handling logic matrix
    function openForexOrder(type) {
        let lotSize = parseFloat(document.getElementById('lot-size').value);
        if(isNaN(lotSize) || lotSize <= 0) return alert("Invalid Lot Size parameters defined.");

        let order = {
            id: Math.floor(Math.random() * 900000 + 100000),
            pair: activePair,
            type: type,
            lots: lotSize,
            entryPrice: forexMarkets[activePair].price
        };

        openPositions.push(order);
        renderPositionsTerminal();
    }

    function closeForexOrder(id) {
        openPositions = openPositions.filter(pos => pos.id !== id);
        renderPositionsTerminal();
    }

    function calculateFloatingPnL() {
        let logContainer = document.getElementById('open-positions-log');
        if(!openPositions.length) {
            logContainer.innerHTML = `<div style="padding:20px; color:var(--text-dim); text-align:center;">No open institutional market orders pending.</div>`;
            return;
        }

        let html = '';
        openPositions.forEach(pos => {
            let currentPrice = forexMarkets[pos.pair].price;
            let multiplier = pos.pair === "USD/JPY" ? 1000 : 100000; // Contract Sizes Standard Matrix
            let pnl = 0;

            if(pos.type === 'BUY') {
                pnl = (currentPrice - pos.entryPrice) * pos.lots * multiplier;
            } else {
                pnl = (pos.entryPrice - currentPrice) * pos.lots * multiplier;
            }

            // Convert raw cross value metric into approximate KES structure value
            let pnlKes = pnl * 130; 

            html += `
                <div class="position-item">
                    <span class="${pos.type === 'BUY' ? 'pos-buy' : 'pos-sell'}"><b>${pos.type}</b> ${pos.pair} (${pos.lots} Lots)</span>
                    <span style="color:var(--text-dim)">Entry: ${pos.entryPrice.toFixed(forexMarkets[pos.pair].digits)}</span>
                    <span>Live: ${currentPrice.toFixed(forexMarkets[pos.pair].digits)}</span>
                    <span style="font-weight:bold; color:${pnlKes >= 0 ? 'var(--high-green)' : 'var(--low-red)'}">KES ${pnlKes.toFixed(2)}</span>
                    <button style="background:var(--low-red); border:none; color:white; border-radius:4px; padding:2px 8px; cursor:pointer;" onclick="closeForexOrder(${pos.id})">Close</button>
                </div>
            `;
        });
        logContainer.innerHTML = html;
    }

    function renderPositionsTerminal() {
        calculateFloatingPnL();
    }

    function switchAccountMode(mode, btn) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-demo', 'active-real'));
        if(mode === 'DEMO') {
            btn.classList.add('active-demo');
            window.CURRENT_ACCOUNT_MODE = "DEMO";
        } else {
            btn.classList.add('active-real');
            window.CURRENT_ACCOUNT_MODE = "REAL";
        }
    }

    function executeDepositRoute() { alert("Securing Broker Node Route:\nForwarding to core payment gateway API ledger link."); }
    function executeWithdrawalRoute() { alert("Securing Broker Clearing Route:\nForwarding transaction parameter extraction pipeline."); }

    // Kickstart application context structures
    renderMarketWatch();
    renderPositionsTerminal();
</script>
</body>
</html>
