<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | NEXAFX Premium Architecture</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #06090f; --bg-card: #11171f; --primary: #00d4ff;
            --success: #00e676; --danger: #ff5252; --text-dim: #707a8a;
            --text-light: #ffffff; --border-color: #222222;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            background-color: var(--bg-deep); color: var(--text-light);
            font-family: 'Inter', 'Segoe UI', Roboto, -apple-system, sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex;
            align-items: center; justify-content: center; overflow-x: hidden;
        }
        .auth-container { width: 100%; max-width: 420px; padding: 25px; z-index: 10; position: relative; }
        .auth-card {
            background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; padding: 30px 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        .auth-header { text-align: center; margin-bottom: 25px; }
        .brand-title { color: #00ff00; font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; text-transform: uppercase; margin: 0; }
        .brand-title span { color: var(--primary); }
        .auth-subtitle { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; text-transform: uppercase; }
        .form-group { position: relative; margin-bottom: 18px; width: 100%; }
        .form-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .auth-input {
            width: 100%; background-color: var(--bg-deep); border: 1px solid var(--border-color);
            color: var(--text-light); padding: 12px 14px 12px 42px; font-size: 0.9rem;
            border-radius: 8px; outline: none; font-family: inherit;
        }
        .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0, 212, 255, 0.15); }
        .btn-auth-submit {
            width: 100%; background: var(--primary); color: #000000; border: none;
            padding: 14px; font-size: 1rem; font-weight: 800; text-transform: uppercase;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; margin-top: 25px;
        }
        .btn-auth-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .status-message { margin-top: 15px; font-size: 0.85rem; font-weight: 700; text-align: center; min-height: 20px; font-family: monospace; }
        .msg-error { color: var(--danger); }
        .msg-success { color: var(--success); }
        .auth-routing-footer { margin-top: 20px; text-align: center; font-size: 0.8rem; color: var(--text-dim); }
        .auth-routing-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="brand-title">NEXAFX<span>TRADE</span></h1>
            <div class="auth-subtitle">Secure Access Portal Node</div>
        </div>

        <div class="form-group">
            <input type="email" id="email" class="auth-input" placeholder="Registered Email Address" required>
            <i class="fas fa-envelope"></i>
        </div>

        <div class="form-group">
            <input type="password" id="password" class="auth-input" placeholder="Account Password" required>
            <i class="fas fa-lock"></i>
        </div>

        <button class="btn-auth-submit" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Access Vault
        </button>

        <p id="msg" class="status-message"></p>

        <div class="auth-routing-footer">
            Don't have an operating terminal node? <a href="/register">Register Terminal</a>
        </div>
    </div>
</div>

<script>
    const getApiBase = () => {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        return isLocal ? "http://localhost:5000/api" : "https://nexapayfx-backend.vercel.app/api"; 
    };

    async function login(){
        const msgNode = document.getElementById("msg");
        msgNode.innerText = "Connecting to network node...";
        msgNode.className = "status-message msg-success";

        const emailValue = document.getElementById("email").value.trim();
        const passwordValue = document.getElementById("password").value;

        if(!emailValue || !passwordValue) {
            msgNode.innerText = "⚠️ Credentials inputs cannot be blank.";
            msgNode.className = "status-message msg-error";
            return;
        }

        try {
            const res = await fetch(`${getApiBase()}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: emailValue, password: passwordValue })
            });

            const data = await res.json();

            if(res.ok){
                msgNode.innerText = "Authorization granted! Syncing data modules...";
                msgNode.className = "status-message msg-success";
                
                localStorage.setItem("token", data.token);
                if (data.user) {
                    localStorage.setItem("operatorName", data.user.name);
                    // UPDATED: Save the whole user object so the dashboard loads instantly
                    localStorage.setItem("user", JSON.stringify(data.user));
                }
                
                // UPDATED: Changed from "dashboard.html" to "/dashboard" for Next.js routing
                setTimeout(() => {
                    window.location.href = "/dashboard"; 
                }, 800);
            } else {
                msgNode.innerText = "❌ Login failed: " + (data.message || "Invalid credentials.");
                msgNode.className = "status-message msg-error";
            }
        } catch(error) {
            if (error.message.includes("Failed to fetch")) {
                msgNode.innerText = "❌ CONNECTION FAILED: CHECK SERVER/CORS.";
            } else {
                msgNode.innerText = "❌ ERROR: " + error.message.toUpperCase();
            }
            msgNode.className = "status-message msg-error";
        }
    }
</script>
</body>
</html>
