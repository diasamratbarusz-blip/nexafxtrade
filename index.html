<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexafxtrade | Buy Low Sell High</title>
    <!-- Link to your external stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Essential: Libraries for high-performance live visuals -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Connects frontend to the Socket.io engine in server.js -->
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* Embedded critical styles to ensure layout matches image_3.png */
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #111; border-bottom: 1px solid #333; }
        .brand { color: #00ff00; font-weight: bold; font-size: 1.2rem; }
        .content-grid { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }
        .chat-section { background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .chat-header { background: #008000; padding: 10px; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chat-body { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .trade-section { position: relative; display: flex; flex-direction: column; background: #000; padding: 10px; }
        .chart-container { flex: 1; min-height: 300px; position: relative; }
        .rate-overlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 1px solid #fff; padding: 5px 15px; border-radius: 5px; z-index: 10; font-family: monospace; }
        .trade-controls { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; }
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .buy-btn { background: #00ff00; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .sell-btn { background: #ff0000; color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .legal-footer { font-size: 10px; color: #666; text-align: center; padding: 10px; background: #050505; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="main-header">
            <div class="brand">Nexafxtrade</div>
            <div class="nav-controls" style="display: flex; align-items: center; gap: 10px;">
                <div class="balance-box" style="background: #222; padding: 5px 10px; border-radius: 4px;">
                    <span style="color: #888; font-size: 0.7rem;">KES</span>
                    <span id="user-balance" style="color: #ffcc00; font-weight: bold;">0.00</span>
                </div>
                <button style="background: #00ff00; border: none; border-radius: 4px; padding: 6px 12px; font-weight: bold; cursor: pointer;">Deposit</button>
                <button style="background: #333; border: none; color: #fff; border-radius: 4px; padding: 6px 12px; cursor: pointer;">Withdraw</button>
                <div style="font-size: 1.5rem; cursor: pointer;">☰</div>
            </div>
        </header>

        <main class="content-grid">
            <!-- Live Activity Sidebar (Social Proof Chat) -->
            <section class="chat-section">
                <div class="chat-header"><span>💬</span> Chat</div>
                <div id="chat-feed" class="chat-body"></div>
                <div style="padding: 10px; border-top: 1px solid #222; display: flex; gap: 5px;">
                    <input type="text" id="chat-input-field" placeholder="Write message..." style="flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px;">
                    <button id="send-chat-btn" style="background: #444; border: none; color: #fff; padding: 0 10px; border-radius: 4px; cursor: pointer;">SEND</button>
                </div>
            </section>

            <!-- Trading Center -->
            <section class="trade-section">
                <div class="rate-overlay">Rate: <span id="current-rate">0.0000</span></div>
                
                <div class="chart-container">
                    <canvas id="tradeChart"></canvas>
                </div>

                <div class="trade-controls">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px;">
                        <button class="adj-btn" onclick="adjustAmount(-10)" style="width:30px; height:30px; border:1px solid #00ff00; background:none; color:#00ff00;">-</button>
                        <input type="number" id="trade-amount" value="100" style="background:#000; border:1px solid #fff; color:#fff; text-align:center; padding:5px; width:100px;">
                        <button class="adj-btn" onclick="adjustAmount(10)" style="width:30px; height:30px; border:1px solid #00ff00; background:none; color:#00ff00;">+</button>
                        <button onclick="adjustAmount('double')" style="background:#333; border:none; color:#fff; padding:5px 10px; border-radius:3px;">x2</button>
                    </div>
                    
                    <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 15px;">
                        <button onclick="setSum(100)" style="flex:1; background:#004d00; border:1px solid #00ff00; color:#fff; padding:5px;">100</button>
                        <button onclick="setSum(200)" style="flex:1; background:#004d00; border:1px solid #00ff00; color:#fff; padding:5px;">200</button>
                        <button onclick="setSum(500)" style="flex:1; background:#004d00; border:1px solid #00ff00; color:#fff; padding:5px;">500</button>
                        <button onclick="setSum(100)" style="width:40px; background:#440000; border:1px solid #ff0000; color:#fff;">↺</button>
                    </div>

                    <div class="action-buttons">
                        <button id="buy-btn" class="buy-btn">BUY</button>
                        <button id="sell-btn" class="sell-btn">SELL</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="legal-footer">
            <p>Nexafxtrade is a fully licensed entity under Prosport Africa Ltd. Physical Address: Binaa Mall, 2nd Floor, Nairobi, Kenya.</p>
            <p>&copy; 2026 Nexafxtrade | support@unasemeje.com</p>
        </footer>
    </div>

    <script>
        const socket = io();
        const ctx = document.getElementById('tradeChart').getContext('2d');
        let chartData = Array(60).fill(0.00); 
        let labels = Array(60).fill('');

        const tradeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: chartData,
                    borderColor: '#00ff00',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: { target: 'origin', above: 'rgba(0, 255, 0, 0.2)', below: 'rgba(255, 0, 0, 0.2)' },
                    tension: 0.4 // Smooth wavy movement
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 400, easing: 'linear' },
                scales: {
                    x: { display: false },
                    y: { min: -0.12, max: 0.12, grid: { color: '#222' }, ticks: { color: '#666' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        socket.on('market-update', (data) => {
            document.getElementById('current-rate').innerText = data.rate.toFixed(4);
            chartData.shift();
            chartData.push(data.rate);
            tradeChart.update('none');
        });

        // Chat & Social Proof Logic
        const chatFeed = document.getElementById('chat-feed');
        const systemUsers = ['@Vokkeh', '@Leonheart', '@Rose404', '@Pati', '@Xy1', '@Lucid@juicewrld'];

        function addSystemNotification() {
            const user = systemUsers[Math.floor(Math.random() * systemUsers.length)];
            const amount = (Math.random() * 400 + 100).toFixed(2);
            const div = document.createElement('div');
            div.style.marginBottom = "10px";
            div.innerHTML = `<span style="color:#ffcc00; font-weight:bold;">System:</span> CONGRATULATIONS ${user} on your withdrawal of ${amount} 🤑🔥`;
            chatFeed.appendChild(div);
            chatFeed.scrollTop = chatFeed.scrollHeight;
            if (chatFeed.children.length > 15) chatFeed.removeChild(chatFeed.children[0]);
        }
        setInterval(addSystemNotification, 7000);

        document.getElementById('send-chat-btn').onclick = () => {
            const input = document.getElementById('chat-input-field');
            if(input.value) {
                socket.emit('send-chat', { user: 'Me', message: input.value });
                input.value = '';
            }
        };

        socket.on('receive-chat', (data) => {
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = `<span style="color: #00ff00; font-weight:bold;">${data.user}:</span> ${data.message}`;
            chatFeed.appendChild(div);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        });

        function adjustAmount(val) {
            const input = document.getElementById('trade-amount');
            let current = parseInt(input.value) || 0;
            input.value = (val === 'double') ? current * 2 : current + val;
        }
        function setSum(val) { document.getElementById('trade-amount').value = val; }
    </script>
</body>
</html>
