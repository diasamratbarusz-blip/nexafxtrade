<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXAFX | Pro KES Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00ff88;
            --low-red: #ff3366;
            --neon-blue: #00d4ff;
            --bg-black: #06080a;
            --panel: #11151c;
            --gold: #ffcc00;
            --text-dim: #707a8a;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-black); color: white;
            font-family: 'Inter', sans-serif; height: 100vh;
            user-select: none; display: flex; justify-content: center; align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: var(--bg-black);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 65px; background: var(--panel); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 2px solid #222;
            z-index: 100; flex-shrink: 0;
        }

        .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--high-green); }

        .balance-container {
            background: #000; border: 1px solid var(--high-green);
            padding: 8px 20px; border-radius: 10px; text-align: right;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .balance-label { font-size: 0.65rem; color: #888; display: block; font-weight: bold; }
        .balance-val { color: var(--gold); font-family: monospace; font-size: 1.2rem; font-weight: 900; }

        #market-status-bar {
            height: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.5s; background: #1a1a1a; flex-shrink: 0;
        }
        .status-high { background: var(--high-green) !important; color: #000; box-shadow: 0 0 20px var(--high-green); }
        .status-low { background: var(--low-red) !important; color: #fff; box-shadow: 0 0 20px var(--low-red); }

        .main-layout {
            display: grid; grid-template-columns: 280px 1fr; flex: 1;
            background: #111; gap: 1px; overflow: hidden;
        }

        .side-activity { background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
        .trading-zone { 
            background: var(--bg-black); display: flex; flex-direction: column; 
            position: relative; transition: 0.5s; overflow-y: auto;
        }

        .market-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.05; transition: 0.8s; z-index: 0;
        }

        .price-hero { padding: 15px 20px; z-index: 1; display: flex; justify-content: space-between; align-items: flex-start; }
        .ticker-val { font-size: 3.2rem; font-weight: 900; font-family: 'Courier New', monospace; letter-spacing: -2px; }

        .top-graph-auth-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 5px;
        }
        .graph-auth-btn {
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .btn-graph-login {
            background: transparent;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-graph-login:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }
        .btn-graph-register {
            background: var(--neon-blue);
            color: #000;
        }
        .btn-graph-register:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .graph-top-history-ribbon {
            background: #0d1117;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            padding: 8px 20px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 24px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .history-ribbon-label {
            font-size: 0.7rem; color: var(--text-dim); font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; border-right: 1px solid #333; padding-right: 10px;
        }
        .history-item-container { display: flex; align-items: center; gap: 8px; }
        .badge-won {
            background: rgba(0, 255, 136, 0.15); border: 1px solid var(--high-green);
            color: var(--high-green); padding: 3px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 900; font-family: monospace;
        }
        .badge-lost-target {
            background: rgba(255, 51, 102, 0.15); border: 1px solid var(--low-red);
            color: var(--low-red); padding: 3px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 900; font-family: monospace;
        }

        .universal-action-bar {
            display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 20px; z-index: 2;
            justify-content: space-between; align-items: center; background: rgba(17, 21, 28, 0.6);
            border-bottom: 1px solid #222; border-top: 1px solid #222;
        }
        .util-btn {
            flex: 1; min-width: 100px; padding: 10px 12px; font-size: 0.8rem; font-weight: 800;
            text-transform: uppercase; border-radius: 8px; cursor: pointer; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease; color: #fff;
        }
        .btn-deposit-nav { background: var(--high-green); color: #000; border-color: var(--high-green); }
        .btn-withdraw-nav { background: #222; border-color: #444; }
        
        .mode-btn {
            flex: 1; padding: 10px 12px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase;
            border-radius: 8px; cursor: pointer; text-align: center; transition: 0.2s ease;
            background: #111; color: #555; border: 1px solid #222;
        }
        .mode-btn.active-demo { background: rgba(0, 212, 255, 0.15); color: var(--neon-blue); border-color: var(--neon-blue); }
        .mode-btn.active-real { background: rgba(0, 255, 136, 0.15); color: var(--high-green); border-color: var(--high-green); }

        .live-transaction-counter {
            background: linear-gradient(90deg, rgba(17, 21, 28, 0.9) 0%, rgba(6, 8, 10, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08); border-left: 4px solid var(--neon-blue);
            border-radius: 10px; padding: 12px 20px; margin: 10px 20px 0 20px; z-index: 2;
            display: flex; justify-content: space-between; align-items: center;
        }
        .live-running-amount { font-size: 1.5rem; font-weight: 900; font-family: monospace; color: #fff; }
        .live-running-amount.profit-reached { color: var(--high-green) !important; text-shadow: 0 0 10px rgba(0,255,136,0.3); }

        #chart-container { flex: 1; min-height: 220px; padding: 0 20px; position: relative; z-index: 1; }

        .bottom-controls {
            background: var(--panel); padding: 25px; border-top: 1px solid #333;
            display: flex; flex-direction: column; gap: 20px; z-index: 1; flex-shrink: 0;
        }

        .stake-box {
            background: #000; border: 1px solid #333; border-radius: 15px;
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
        }
        .stake-box input {
            background: transparent; border: none; color: white; font-size: 2rem;
            font-weight: 900; width: 100%; text-align: center; outline: none;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            height: 75px; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
            gap: 10px; position: relative; overflow: hidden; text-transform: uppercase;
        }
        .btn-buy { background: var(--high-green); color: #000; box-shadow: 0 6px 0 #008844; }
        .btn-sell { background: var(--low-red); color: #fff; box-shadow: 0 6px 0 #991133; }
        .cooldown-overlay { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(0,0,0,0.4); z-index: 1; }

        @media (max-width: 850px) {
            .app-container { height: 100vh; max-height: none; border: none; }
            .main-layout { grid-template-columns: 1fr; }
            .side-activity { display: none; }
            .ticker-val { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">NEXAFX<span>TRADE</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="audio-btn" onclick="initBeats()" style="background: var(--neon-blue); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                <i class="fas fa-play"></i> ACTIVATE SOUND
            </button>
            <div class="balance-container">
                <span class="balance-label">WALLET BALANCE</span>
                <span class="balance-val" id="balance">1,450,000.00</span>
            </div>
        </div>
    </header>

    <div id="market-status-bar">Monitoring Market Neutrality...</div>

    <div class="main-layout">
        <section class="side-activity">
            <div style="padding: 15px; background: #1c222b; font-weight: bold; font-size: 0.8rem; color: var(--high-green);">
                <i class="fas fa-broadcast-tower"></i> LIVE WITHDRAWALS
            </div>
            <div id="payout-feed" style="padding: 10px; font-size: 0.85rem; line-height: 1.8;"></div>
        </section>

        <section class="trading-zone" id="zone-bg">
            <div class="market-glow" id="market-glow"></div>
            
            <div class="price-hero">
                <div>
                    <span style="color: #666; font-size: 0.8rem; font-weight: bold;">BTC/KES REALTIME</span>
                    <div class="ticker-val" id="ticker-price">8,421,500</div>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                    <div id="market-trend" style="background: rgba(0,255,136,0.1); padding: 10px 20px; border-radius: 10px; font-weight: 900; color: var(--high-green);">
                        +0.00%
                    </div>
                    <div class="top-graph-auth-actions">
                        <button class="graph-auth-btn btn-graph-login" onclick="location.href='/login'">Login</button>
                        <button class="graph-auth-btn btn-graph-register" onclick="location.href='/register'">Register</button>
                    </div>
                </div>
            </div>

            <div class="graph-top-history-ribbon">
                <span class="history-ribbon-label">Position History</span>
                <div id="live-history-ribbon-content" class="history-item-container">
                    <span style="color: #444; font-size: 0.75rem;">No recent trade streams completed</span>
                </div>
            </div>

            <div class="universal-action-bar">
                <div class="utility-group">
                    <button class="util-btn btn-deposit-nav" onclick="executeDepositRoute()">Deposit</button>
                    <button class="util-btn btn-withdraw-nav" onclick="executeWithdrawalRoute()">Withdrawal</button>
                    <button class="util-btn btn-how-to-trade" onclick="toggleHowToTradeModal()">How to Trade</button>
                    <button class="util-btn btn-referral" onclick="triggerReferralSystem()">Referral</button>
                </div>
                <div class="account-mode-group">
                    <button class="mode-btn" id="demo-mode-btn" onclick="switchAccountMode('DEMO', this)">Demo Play</button>
                    <button class="mode-btn active-real" id="real-mode-btn" onclick="switchAccountMode('REAL', this)">Real Play</button>
                </div>
            </div>

            <div class="live-transaction-counter">
                <div class="counter-details">
                    <span class="counter-title">Live Position Counter</span>
                    <span id="aiming-target-indicator">No active trade counting</span>
                </div>
                <div class="live-running-amount" id="live-running-amount">KES 0.00</div>
            </div>

            <div id="chart-container">
                <canvas id="liveGraph"></canvas>
            </div>

            <div class="bottom-controls">
                <div class="stake-box">
                    <span style="color: #444; font-weight: bold;">KES</span>
                    <input type="number" id="stake-amount" value="500">
                    <span style="color: var(--high-green); font-weight: bold;">STAKE</span>
                </div>
                <div class="action-btns">
                    <button class="btn btn-buy" id="buy-btn" onclick="executeBuy()">
                        <i class="fas fa-bolt"></i> BUY
                    </button>
                    <button class="btn btn-sell" id="sell-btn" disabled onclick="executeSell()">
                        <div class="cooldown-overlay" id="sell-timer-bar"></div>
                        <span id="sell-label"><i class="fas fa-hand-holding-usd"></i> SELL</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    // --- GLOBAL AUTH & CONFIG ---
    window.USER_IS_AUTHENTICATED = false; 
    window.CURRENT_ACCOUNT_MODE = "REAL"; 

    window.NEXAFX_ADMIN_CONFIG = {
        forcedTrend: "DYNAMIC",       
        minimumTicketPrice: 100,       
        maximumTicketPrice: 500000,   
        customTargetRatio: 1.85       
    };

    let balance = 1450000;
    let price = 8421500;
    let isLocked = false;
    let audioCtx = null;
    let masterGainNode = null;
    let isMarketHigh = false;
    let activeTradePosition = null;
    let tradeTicksElapsed = 0;
    let currentHighTicksLimit = 45; 

    // --- SOUND ENGINE ---
    function initBeats() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGainNode = audioCtx.createGain();
        masterGainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); 
        masterGainNode.connect(audioCtx.destination);
        document.getElementById('audio-btn').innerHTML = '<i class="fas fa-volume-up"></i> BEATS ACTIVE';
        document.getElementById('audio-btn').style.background = "var(--high-green)";
        startAfroLoop();
    }

    function playSynth(freq, type, dur, vol) {
        if(!audioCtx || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(masterGainNode);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }

    function startAfroLoop() {
        setInterval(() => {
            playSynth(isMarketHigh ? 110 : 95, 'sine', 0.5, 0.5);
        }, 1000);
    }

    // --- CHART ENGINE ---
    const ctx = document.getElementById('liveGraph').getContext('2d');
    let dataPoints = Array(50).fill(price);
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataPoints.map(() => ''),
            datasets: [{
                data: dataPoints,
                borderColor: '#00ff88',
                borderWidth: 4,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(0, 255, 136, 0.05)',
                tension: 0.3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 0 },
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { position: 'right', grid: { color: '#222' } } }
        }
    });

    // --- MARKET LOOP ---
    setInterval(() => {
        let change = (Math.random() - 0.46) * 5000;
        
        if (activeTradePosition) {
            tradeTicksElapsed++;
            let progress = tradeTicksElapsed / currentHighTicksLimit;
            activeTradePosition.lastKnownValue = activeTradePosition.stake * (1 + (progress * 5.2));

            if (tradeTicksElapsed <= activeTradePosition.lossTickThreshold) {
                change = Math.abs(change) + 2000;
            } else {
                change = -Math.abs(change) - 5000;
                handleTradeExpirationLoss();
                return;
            }
        }

        price += change;
        if (price < 8000000) price = 8000000;

        isMarketHigh = change > 0;
        document.getElementById('ticker-price').innerText = Math.floor(price).toLocaleString();
        document.getElementById('market-status-bar').className = isMarketHigh ? "status-high" : "status-low";
        document.getElementById('market-glow').style.background = isMarketHigh ? "var(--high-green)" : "var(--low-red)";
        
        dataPoints.push(price);
        dataPoints.shift();
        chart.update('none');
        processLiveCountingTransaction();
    }, 150);

    // --- TRADE ACTIONS ---
    function executeBuy() {
        if (window.CURRENT_ACCOUNT_MODE === "REAL" && !window.USER_IS_AUTHENTICATED) {
            alert("Auth Required: Login to trade KES.");
            window.location.href = "/login";
            return;
        }

        const amt = parseFloat(document.getElementById('stake-amount').value);
        if (amt > balance) return alert("Insufficient Balance");

        balance -= amt;
        updateBalance();
        
        let lifeSecs = Math.random() * 15 + 5;
        currentHighTicksLimit = Math.floor((lifeSecs * 1000) / 150);
        
        activeTradePosition = {
            stake: amt,
            hasSold: false,
            lossTickThreshold: Math.floor(currentHighTicksLimit * (Math.random() * 0.7 + 0.2))
        };

        tradeTicksElapsed = 0;
        isLocked = true;
        document.getElementById('sell-btn').disabled = true;
        document.getElementById('sell-timer-bar').style.width = "100%";
        
        setTimeout(() => {
            isLocked = false;
            document.getElementById('sell-btn').disabled = false;
            document.getElementById('sell-timer-bar').style.width = "0%";
            document.getElementById('sell-label').innerHTML = `<i class="fas fa-hand-holding-usd"></i> SELL`;
        }, 3000);
    }

    function executeSell() {
        if (isLocked || !activeTradePosition || activeTradePosition.hasSold) return;
        
        let progress = tradeTicksElapsed / currentHighTicksLimit;
        let finalProfit = activeTradePosition.stake * (1 + (progress * 5.2));
        
        activeTradePosition.hasSold = true;
        balance += finalProfit;
        updateBalance();
        
        alert(`Won: KES ${finalProfit.toFixed(2)}`);
        activeTradePosition = null;
        document.getElementById('sell-btn').disabled = true;
    }

    function handleTradeExpirationLoss() {
        if (!activeTradePosition || activeTradePosition.hasSold) return;
        alert("Market Crashed!");
        activeTradePosition = null;
    }

    function updateBalance() {
        document.getElementById('balance').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function switchAccountMode(mode, btn) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-demo', 'active-real'));
        btn.classList.add(mode === 'DEMO' ? 'active-demo' : 'active-real');
        window.CURRENT_ACCOUNT_MODE = mode;
        balance = mode === 'DEMO' ? 100000 : 0;
        updateBalance();
    }

    function processLiveCountingTransaction() {
        if (activeTradePosition) {
            let progress = tradeTicksElapsed / currentHighTicksLimit;
            let val = activeTradePosition.stake * (1 + (progress * 5.2));
            document.getElementById('live-running-amount').innerText = `KES ${val.toFixed(2)}`;
        }
    }

    // Placeholder UI helpers
    function executeDepositRoute() { window.location.href = "/deposit"; }
    function executeWithdrawalRoute() { window.location.href = "/withdraw"; }
    function toggleHowToTradeModal() { alert("Buy high, sell before the crash!"); }
    function triggerReferralSystem() { alert("Referral link copied!"); }
</script>
</body>
</html>
