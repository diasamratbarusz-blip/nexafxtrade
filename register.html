<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXAFX | Register Terminal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --high-green: #00ff88;
            --neon-blue: #00d4ff;
            --bg-black: #06090f;
            --panel: #11171f;
            --text-dim: #707a8a;
            --error-red: #ff5252;
        }

        body, html {
            margin: 0; padding: 0; 
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .auth-card {
            background-color: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 35px 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-title {
            color: var(--high-green);
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin: 0;
        }

        .brand-title span {
            color: var(--neon-blue);
        }

        .auth-subtitle {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #444;
            font-size: 0.9rem;
        }

        .auth-input {
            width: 100%;
            background-color: #06080a;
            border: 1px solid #222;
            color: white;
            padding: 14px 14px 14px 45px;
            font-size: 0.95rem;
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .auth-input:focus {
            border-color: var(--neon-blue);
        }

        .btn-auth-submit {
            width: 100%;
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-auth-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            font-family: 'Courier New', monospace;
            min-height: 20px;
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .link-text {
            color: var(--neon-blue);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        /* Loading Animation */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="brand-title">NEXAFX<span>TRADE</span></h1>
            <div class="auth-subtitle">Initialize Account Terminal</div>
        </div>

        <div class="form-group">
            <i class="fas fa-user"></i>
            <input type="text" id="name" class="auth-input" placeholder="Full Operator Name" required>
        </div>

        <div class="form-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" class="auth-input" placeholder="Registered Email Address" required>
        </div>

        <div class="form-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="phone" class="auth-input" placeholder="Phone (e.g., 254...)" required>
        </div>

        <div class="form-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" class="auth-input" placeholder="Secure Access Password" required>
        </div>

        <button id="registerBtn" class="btn-auth-submit" onclick="handleRegister()">
            <span id="btnText">REGISTER TERMINAL</span>
            <div id="spinner" class="spinner"></div>
        </button>

        <div id="statusMsg" class="status-message"></div>

        <div class="auth-footer">
            Already have an active node? 
            <a href="login.html" class="link-text">Access Vault</a>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:5000/api"; // Replace with your Render URL for production

    async function handleRegister() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const statusEl = document.getElementById('statusMsg');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const registerBtn = document.getElementById('registerBtn');

        // Reset UI
        statusEl.innerText = "ESTABLISHING CONNECTION...";
        statusEl.style.color = "var(--neon-blue)";
        
        if (!name || !email || !phone || !password) {
            statusEl.innerText = "⚠️ ALL CREDENTIAL MODULES REQUIRED.";
            statusEl.style.color = "var(--error-red)";
            return;
        }

        // UI Loading State
        btnText.style.display = "none";
        spinner.style.display = "block";
        registerBtn.disabled = true;

        try {
            const response = await fetch(`${API_BASE}/auth/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, phone, password })
            });

            const data = await response.json();

            if (response.ok) {
                statusEl.innerText = "REGISTRATION AUTHORIZED. REDIRECTING...";
                statusEl.style.color = "var(--high-green)";
                
                // Store Token
                if(data.token) localStorage.setItem("token", data.token);

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
            } else {
                throw new Error(data.message || "TERMINAL REJECTED CREDENTIALS");
            }

        } catch (error) {
            statusEl.innerText = `❌ ERROR: ${error.message.toUpperCase()}`;
            statusEl.style.color = "var(--error-red)";
            
            // Reset Button
            btnText.style.display = "block";
            spinner.style.display = "none";
            registerBtn.disabled = false;
        }
    }
</script>

</body>
</html>
