<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEXAFX | High-Performance Candlestick Engine</title>

  <!-- TradingView Lightweight Charts Library Source -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      background: #06090f;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    #chart {
      width: 100%;
      height: 100vh;
    }

    /* Floating Status Indicator for Technical Performance Check */
    .telemetry-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(11, 15, 23, 0.85);
      border: 1px solid #161f2b;
      padding: 8px 14px;
      border-radius: 6px;
      color: #707a8a;
      font-family: monospace;
      font-size: 0.75rem;
      pointer-events: none;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    .telemetry-overlay span { color: #00e676; font-weight: bold; }
  </style>
</head>

<body>

<div class="telemetry-overlay">ENGINE: <span>LIGHTWEIGHT_CHARTS_v4</span> | PIP_FEED: ACTIVE</div>
<div id="chart"></div>

<script>
// 1. Initialize Canvas Instance on Target Container Node
const container = document.getElementById('chart');
const chart = LightweightCharts.createChart(container, {
  layout: {
    background: { color: '#06090f' },
    textColor: '#707a8a',
    fontSize: 11,
    fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif'
  },
  grid: {
    vertLines: { color: '#11171f' },
    horzLines: { color: '#11171f' },
  },
  crosshair: {
    mode: LightweightCharts.CrosshairMode.Normal,
    vertLine: { color: '#556a85', width: 1, style: 2 },
    horzLine: { color: '#556a85', width: 1, style: 2 },
  },
  rightPriceScale: {
    borderColor: '#161f2b',
    scaleMargins: {
      top: 0.2,
      bottom: 0.2,
    },
  },
  timeScale: {
    borderColor: '#161f2b',
    timeVisible: true,
    secondsVisible: false,
  },
});

// 2. Add Candlestick Series Component Layout with Institutional Colors
const candleSeries = chart.addCandlestickSeries({
  upColor: '#00e676',
  downColor: '#ff1744',
  borderUpColor: '#00e676',
  borderDownColor: '#ff1744',
  wickUpColor: '#00e676',
  wickDownColor: '#ff1744',
});

// 3. Inject Historical Daily Base Data (Timestamps mapped securely)
let currentPrice = 1.08500;
let baseTime = new Date(2026, 5, 1).getTime() / 1000;

const initialHistoryData = [];
for (let i = 0; i < 30; i++) {
  let open = currentPrice;
  let close = open + (Math.random() - 0.5) * 0.00300;
  let high = Math.max(open, close) + Math.random() * 0.00100;
  let low = Math.min(open, close) - Math.random() * 0.00100;
  
  initialHistoryData.push({
    time: baseTime + (i * 86400), // Increments by full calendar days in seconds
    open: parseFloat(open.toFixed(5)),
    high: parseFloat(high.toFixed(5)),
    low: parseFloat(low.toFixed(5)),
    close: parseFloat(close.toFixed(5))
  });
  currentPrice = close;
}
candleSeries.setData(initialHistoryData);

// 4. Setup Microsecond Active Tick Tracker State variables
let lastCandle = initialHistoryData[initialHistoryData.length - 1];
let activeCandleTime = lastCandle.time + 86400; // Next chronological data block coordinate
let activeOpenPrice = lastCandle.close;
let activeHigh = activeOpenPrice;
let activeLow = activeOpenPrice;

/**
 * PRODUCTION-GRADE REAL-TIME CONCURRENT UPDATE EMULATOR
 * Connect this directly to your WebSocket "market-update" callback routines
 */
setInterval(() => {
  // Emulates continuous interbank floating pip adjustments
  let tickPriceChange = (Math.random() - 0.49) * 0.00018; 
  let currentTickPrice = parseFloat((lastCandle.close + tickPriceChange).toFixed(5));

  // Dynamically calculate OHLC boundaries for the open candle runtime window
  activeHigh = Math.max(activeHigh, currentTickPrice);
  activeLow = Math.min(activeLow, currentTickPrice);

  // Update the chart using individual tick update pipeline commands
  lastCandle = {
    time: activeCandleTime,
    open: parseFloat(activeOpenPrice.toFixed(5)),
    high: parseFloat(activeHigh.toFixed(5)),
    low: parseFloat(activeLow.toFixed(5)),
    close: currentTickPrice
  };
  
  candleSeries.update(lastCandle);
}, 300);

// 5. Clean Memory: Force new candle roll periodically (e.g., Every 30 seconds for test demonstration)
setInterval(() => {
  activeCandleTime += 86400;
  activeOpenPrice = lastCandle.close;
  activeHigh = activeOpenPrice;
  activeLow = activeOpenPrice;
}, 30000);

// 6. Native Auto-Resize Engine Listener
window.addEventListener('resize', () => {
  chart.applyOptions({
    width: window.innerWidth,
    height: window.innerHeight
  });
});
</script>

</body>
</html>
