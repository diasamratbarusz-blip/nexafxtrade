<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexa - Standalone Synthetic Trade Terminal</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --card-bg: #161b22;
      --accent-blue: #0088ff;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #30363d;
      --gold: #eab308;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text); padding: 20px; }

    /* Header & Navbar */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .header h1 { font-size: 1.5rem; letter-spacing: 1px; color: var(--accent-blue); }
    .account-info { display: flex; gap: 15px; align-items: center; }
    .balance-badge {
      background: #0b0f14; border: 1px solid var(--border); padding: 6px 14px;
      border-radius: 8px; font-weight: bold; font-size: 1rem; color: var(--green);
    }
    .status-badge { font-size: 0.85rem; padding: 6px 12px; border-radius: 12px; background: rgba(34, 197, 94, 0.2); color: var(--green); }

    /* Layout Grid */
    .grid-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
    @media (max-width: 950px) { .grid-container { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }

    /* Market Selector & Canvas */
    .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    select, input {
      width: 100%; background: #0b0f14; border: 1px solid var(--border); color: var(--text);
      padding: 10px; border-radius: 6px; margin-top: 6px; margin-bottom: 12px; font-size: 0.95rem;
    }

    .price-display { text-align: center; margin: 15px 0; }
    .price-display .price { font-size: 2.5rem; font-weight: bold; font-family: monospace; }
    .price-display .price.up { color: var(--green); }
    .price-display .price.down { color: var(--red); }

    canvas { width: 100%; height: 220px; background: #080b0e; border: 1px solid var(--border); border-radius: 6px; }

    /* Trading Buttons & Form */
    .form-group { margin-bottom: 10px; }
    label { font-size: 0.85rem; color: var(--text-muted); }

    .trade-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn {
      border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer;
      font-size: 1rem; color: white; transition: opacity 0.2s; width: 100%;
    }
    .btn:hover { opacity: 0.85; }
    .btn-rise { background: var(--green); }
    .btn-fall { background: var(--red); }
    .btn-bot { background: var(--gold); color: #000; }
    .btn-bot.active { background: var(--red); color: #fff; }

    /* Logging & Positions Table */
    .log-box {
      background: #080b0e; border: 1px solid var(--border); border-radius: 6px; padding: 10px;
      font-family: monospace; font-size: 0.8rem; height: 140px; overflow-y: auto; color: var(--text-muted);
    }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-muted); }
    .win { color: var(--green); font-weight: bold; }
    .loss { color: var(--red); font-weight: bold; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>NEXA <span style="color:white; font-size:1rem;">| Autonomous Trading Engine</span></h1>
    <div class="account-info">
      <div class="balance-badge"> balance: $<span id="account-balance">1000.00</span></div>
      <div class="status-badge">Engine Active</div>
    </div>
  </div>

  <div class="grid-container">
    
    <!-- Left Column: Synthetic Engine Chart & Feed -->
    <div>
      <div class="card">
        <div class="market-header">
          <h2>Synthetic Market Feed</h2>
          <div style="width: 200px;">
            <select id="symbol-select" onchange="switchMarket()">
              <option value="VOL_100">Volatility 100 Index</option>
              <option value="VOL_75">Volatility 75 Index</option>
              <option value="BOOM_1000">Boom 1000 Index</option>
              <option value="CRASH_1000">Crash 1000 Index</option>
            </select>
          </div>
        </div>

        <div class="price-display">
          <div id="live-price" class="price">1000.00</div>
          <span id="price-time" style="font-size:0.8rem; color: var(--text-muted);">Tick Engine Running...</span>
        </div>

        <!-- Real-time Canvas Graph -->
        <canvas id="priceChart"></canvas>
      </div>

      <!-- Live Contract Positions -->
      <div class="card">
        <h3>Active / Settled Contracts</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Symbol</th>
              <th>Type</th>
              <th>Entry</th>
              <th>Stake</th>
              <th>Status</th>
              <th>Payout</th>
            </tr>
          </thead>
          <tbody id="positions-table">
            <!-- Active trades inject here -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Right Column: Trade Controls & Automated Bots -->
    <div>
      <!-- Manual Trading -->
      <div class="card">
        <h2>Manual Execution</h2>

        <div class="form-group" style="margin-top: 10px;">
          <label>Stake Amount ($)</label>
          <input type="number" id="stake-amount" value="10" min="1">
        </div>

        <div class="form-group">
          <label>Contract Duration (Ticks)</label>
          <input type="number" id="duration" value="5" min="1" max="15">
        </div>

        <div class="trade-buttons">
          <button class="btn btn-rise" onclick="manualTrade('CALL')">RISE ▲</button>
          <button class="btn btn-fall" onclick="manualTrade('PUT')">FALL ▼</button>
        </div>
      </div>

      <!-- Algorithmic Trading Bots -->
      <div class="card">
        <h2>Automated Bots</h2>
        <div class="form-group" style="margin-top: 10px;">
          <label>Select Strategy Engine</label>
          <select id="bot-strategy">
            <option value="martingale">Tick Martingale Bot (Rise/Fall)</option>
            <option value="sma">SMA Crossover Trend Bot</option>
          </select>
        </div>

        <div class="form-group">
          <label>Base Stake ($)</label>
          <input type="number" id="bot-stake" value="5" min="1">
        </div>

        <button id="bot-toggle-btn" class="btn btn-bot" onclick="toggleBot()">START AUTO-BOT</button>
      </div>

      <!-- System Log Output -->
      <div class="card">
        <h3 style="font-size: 0.9rem; margin-bottom: 8px;">Engine Logs</h3>
        <div id="log-output" class="log-box"></div>
      </div>
    </div>

  </div>

  <script>
    // --- 1. GLOBAL STATE & SYNTHETIC MARKET SIMULATOR ---
    let balance = 1000.00;
    let activeSymbol = 'VOL_100';
    let lastPrice = 1000.00;
    let priceHistory = [1000.00];
    let activeContracts = [];
    let tradeCounter = 1000;
    
    // Bot Execution Engine state
    let isBotActive = false;
    let botLastResult = 'WIN';
    let currentBotStake = 5;
    let botCooldown = false;

    const marketConfigs = {
      VOL_100: { base: 1000.00, volatility: 2.5, spikeChance: 0 },
      VOL_75:  { base: 750.00,  volatility: 4.5, spikeChance: 0 },
      BOOM_1000: { base: 5000.00, volatility: 0.8, spikeChance: 0.08, spikeType: 'UP' },
      CRASH_1000: { base: 5000.00, volatility: 0.8, spikeChance: 0.08, spikeType: 'DOWN' }
    };

    // --- 2. LOCAL TICK ENGINE (Generates price every 1000ms) ---
    function tickEngine() {
      const config = marketConfigs[activeSymbol];
      let change = (Math.random() - 0.5) * config.volatility;

      // Simulate Boom/Crash Spikes
      if (config.spikeChance > 0 && Math.random() < config.spikeChance) {
        if (config.spikeType === 'UP') change = 35.0 + Math.random() * 20;
        if (config.spikeType === 'DOWN') change = -(35.0 + Math.random() * 20);
      }

      const newPrice = Math.max(10, lastPrice + change);
      updateMarketUI(newPrice);
      processContracts(newPrice);
      runBotStrategy(newPrice);
    }

    function switchMarket() {
      activeSymbol = document.getElementById('symbol-select').value;
      lastPrice = marketConfigs[activeSymbol].base;
      priceHistory = [lastPrice];
      log(`Switched market index to: ${activeSymbol}`);
    }

    function updateMarketUI(price) {
      const priceElem = document.getElementById("live-price");
      const timeElem = document.getElementById("price-time");

      priceElem.className = price > lastPrice ? "price up" : "price down";
      lastPrice = price;
      priceElem.innerText = price.toFixed(2);
      timeElem.innerText = `Tick: ${new Date().toLocaleTimeString()}`;

      priceHistory.push(price);
      if (priceHistory.length > 50) priceHistory.shift();
      drawChart();
    }

    // --- 3. CANVAS CHARTING SYSTEM ---
    function drawChart() {
      const canvas = document.getElementById("priceChart");
      const ctx = canvas.getContext("2d");
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (priceHistory.length < 2) return;

      const min = Math.min(...priceHistory) * 0.999;
      const max = Math.max(...priceHistory) * 1.001;
      const step = canvas.width / (priceHistory.length - 1);

      ctx.beginPath();
      ctx.strokeStyle = "#0088ff";
      ctx.lineWidth = 2;

      priceHistory.forEach((val, index) => {
        const x = index * step;
        const y = canvas.height - ((val - min) / (max - min)) * canvas.height;
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });

      ctx.stroke();
    }

    // --- 4. EXECUTION & MATCHING ENGINE ---
    function executeContract(symbol, type, stake, duration) {
      if (stake > balance) {
        log(`[FAILED] Insufficient balance for stake: $${stake}`);
        return false;
      }

      balance -= stake;
      updateBalance();

      tradeCounter++;
      const contract = {
        id: `#NEX-${tradeCounter}`,
        symbol: symbol,
        type: type,
        entryPrice: lastPrice,
        stake: stake,
        duration: duration,
        ticksLeft: duration,
        status: 'ACTIVE'
      };

      activeContracts.unshift(contract);
      log(`[ORDER] ${type} executed on ${symbol} @ $${lastPrice.toFixed(2)} | Stake: $${stake}`);
      renderTable();
      return true;
    }

    function manualTrade(type) {
      const stake = parseFloat(document.getElementById('stake-amount').value);
      const duration = parseInt(document.getElementById('duration').value);
      executeContract(activeSymbol, type, stake, duration);
    }

    function processContracts(currentPrice) {
      activeContracts.forEach(contract => {
        if (contract.status === 'ACTIVE') {
          contract.ticksLeft--;
          if (contract.ticksLeft <= 0) {
            // Settle contract
            const isWin = contract.type === 'CALL' ? currentPrice > contract.entryPrice : currentPrice < contract.entryPrice;
            const payout = isWin ? contract.stake * 1.95 : 0;
            
            contract.status = isWin ? 'WON' : 'LOST';
            contract.payout = payout;

            if (isWin) {
              balance += payout;
              updateBalance();
            }

            log(`[SETTLED] ${contract.id} (${contract.type}) -> ${contract.status} | Payout: $${payout.toFixed(2)}`);
          }
        }
      });
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById("positions-table");
      tbody.innerHTML = activeContracts.slice(0, 5).map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.symbol}</td>
          <td><b>${c.type}</b></td>
          <td>${c.entryPrice.toFixed(2)}</td>
          <td>$${c.stake.toFixed(2)}</td>
          <td class="${c.status === 'WON' ? 'win' : c.status === 'LOST' ? 'loss' : ''}">${c.status} (${c.ticksLeft}t)</td>
          <td>$${(c.payout || 0).toFixed(2)}</td>
        </tr>
      `).join('');
    }

    function updateBalance() {
      document.getElementById('account-balance').innerText = balance.toFixed(2);
    }

    // --- 5. AUTOMATED BOT ENGINE ---
    function toggleBot() {
      isBotActive = !isBotActive;
      const btn = document.getElementById('bot-toggle-btn');
      if (isBotActive) {
        btn.innerText = "STOP AUTO-BOT";
        btn.className = "btn btn-bot active";
        currentBotStake = parseFloat(document.getElementById('bot-stake').value);
        log("[BOT] Trading Bot Started.");
      } else {
        btn.innerText = "START AUTO-BOT";
        btn.className = "btn btn-bot";
        log("[BOT] Trading Bot Stopped.");
      }
    }

    function runBotStrategy(price) {
      if (!isBotActive || botCooldown) return;

      // Check if any previous bot trade is still pending
      const hasPending = activeContracts.some(c => c.status === 'ACTIVE');
      if (hasPending) return;

      // Evaluate last bot trade result
      const lastBotTrade = activeContracts[0];
      if (lastBotTrade && lastBotTrade.status !== 'ACTIVE') {
        botLastResult = lastBotTrade.status;
      }

      const strategy = document.getElementById('bot-strategy').value;
      let signal = null;

      if (strategy === 'martingale') {
        const baseStake = parseFloat(document.getElementById('bot-stake').value);
        if (botLastResult === 'LOST') {
          currentBotStake *= 2; // Double stake on loss
          log(`[BOT-MARTINGALE] Previous Lost. Doubling stake to $${currentBotStake}`);
        } else {
          currentBotStake = baseStake; // Reset stake on win
        }
        signal = Math.random() > 0.5 ? 'CALL' : 'PUT';
      } 
      else if (strategy === 'sma') {
        if (priceHistory.length >= 10) {
          const smaFast = priceHistory.slice(-3).reduce((a, b) => a + b) / 3;
          const smaSlow = priceHistory.slice(-8).reduce((a, b) => a + b) / 8;
          signal = smaFast > smaSlow ? 'CALL' : 'PUT';
        }
      }

      if (signal) {
        const success = executeContract(activeSymbol, signal, currentBotStake, 5);
        if (success) {
          botCooldown = true;
          setTimeout(() => { botCooldown = false; }, 5000); // 5s execution cooldown
        }
      }
    }

    function log(msg) {
      const box = document.getElementById("log-output");
      box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      box.scrollTop = box.scrollHeight;
    }

    // Launch Tick Engine Loop
    setInterval(tickEngine, 1000);
    log("Standalone Nexa Synthetic Trading Terminal Initialized.");
  </script>
</body>
</html>
