<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexafxtrade | Premium KES Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #06090f;
            --bg-card: #11171f;
            --primary: #00d4ff;
            --success: #00e676;
            --danger: #ff5252;
            --text-dim: #707a8a;
            --text-light: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* --- Navigation --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; background: rgba(17, 23, 31, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100;
            backdrop-filter: blur(10px);
        }

        .brand { font-size: 1.5rem; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        .wallet-info { text-align: right; border-left: 1px solid #333; padding-left: 20px; }
        .wallet-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .wallet-amount { font-weight: 700; color: var(--success); font-family: monospace; }

        /* --- Dashboard --- */
        main {
            display: grid; grid-template-columns: 1fr 380px;
            gap: 20px; padding: 20px; height: calc(100vh - 80px);
            z-index: 10; position: relative;
        }

        .chart-container {
            background: var(--bg-card); border-radius: 20px; padding: 25px;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .price-header { margin-bottom: 20px; }
        .kes-symbol { color: var(--primary); font-size: 1.2rem; margin-right: 5px; }
        .price-value { font-size: 3.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }

        /* --- Trading Buttons --- */
        .trade-zone {
            display: flex; gap: 15px; margin-top: 25px;
        }
        .btn {
            flex: 1; padding: 18px; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-buy { background: var(--success); box-shadow: 0 8px 20px rgba(0, 230, 118, 0.2); }
        .btn-sell { background: var(--danger); box-shadow: 0 8px 20px rgba(255, 82, 82, 0.2); }
        .btn:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); }
        .btn:active { transform: translateY(0) scale(0.98); }

        /* --- Sidebar & History --- */
        .sidebar { background: var(--bg-card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .history-title { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .log-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.02);
            border-radius: 8px; font-size: 0.85rem; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- Audio Settings Toggle --- */
        .sound-status { cursor: pointer; font-size: 0.8rem; color: var(--text-dim); border: 1px solid #333; padding: 5px 10px; border-radius: 20px; transition: 0.3s; }
        .sound-status.on { color: var(--primary); border-color: var(--primary); }

        /* --- Animated Waves Background --- */
        .wave-bg { position: fixed; bottom: 0; left: 0; width: 100%; height: 15vh; z-index: 1; pointer-events: none; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }
    </style>
</head>
<body>

    <nav>
        <div class="brand">NEXAFX<span style="color:white">TRADE</span></div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="sound-status" id="soundBtn" onclick="initAudio()">
                <i class="fas fa-volume-mute"></i> SOUND OFF
            </div>
            <div class="wallet-info">
                <div class="wallet-label">Available Balance</div>
                <div class="wallet-amount" id="walletBal">KES 1,450,000.00</div>
            </div>
        </div>
    </nav>

    <main>
        <div class="chart-container">
            <div class="price-header">
                <div style="color:var(--text-dim); font-size: 0.9rem;">Live BTC / KES Exchange</div>
                <div>
                    <span class="kes-symbol">KES</span>
                    <span class="price-value" id="mainPrice">8,421,500</span>
                </div>
                <div id="priceTrend" style="font-weight: 600; color: var(--success);">
                    <i class="fas fa-caret-up"></i> +KES 12,400.50 (Live)
                </div>
            </div>

            <div style="flex-grow: 1;">
                <canvas id="tradeChart"></canvas>
            </div>

            <div class="trade-zone">
                <button class="btn btn-buy" onclick="handleTrade('BUY')">
                    <i class="fas fa-shopping-cart"></i> BUY KES
                </button>
                <button class="btn btn-sell" onclick="handleTrade('SELL')">
                    <i class="fas fa-hand-holding-usd"></i> SELL KES
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="history-title">Transaction History</div>
            <div id="tradeLogs">
                <div class="log-item">
                    <span>System Boot</span>
                    <span style="color:var(--text-dim)">READY</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Wave Background -->
    <div class="wave-bg">
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use href="#gentle-wave" x="48" y="0" fill="rgba(0, 212, 255, 0.05)" />
                <use href="#gentle-wave" x="48" y="3" fill="rgba(0, 212, 255, 0.1)" />
                <use href="#gentle-wave" x="48" y="5" fill="rgba(0, 212, 255, 0.02)" />
                <use href="#gentle-wave" x="48" y="7" fill="rgba(0, 212, 255, 0.15)" />
            </g>
        </svg>
    </div>

    <script>
        // --- Sound Engine ---
        let audioCtx;
        let soundEnabled = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            btn.innerHTML = soundEnabled ? '<i class="fas fa-volume-up"></i> SOUND ON' : '<i class="fas fa-volume-mute"></i> SOUND OFF';
            btn.className = soundEnabled ? 'sound-status on' : 'sound-status';
        }

        function playSound(type) {
            if (!soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'tick') {
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'buy') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'sell') {
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- Chart Logic ---
        const ctx = document.getElementById('tradeChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
        gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');

        let dataPoints = Array(40).fill(8421500);
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(40).fill(''),
                datasets: [{
                    data: dataPoints,
                    borderColor: '#00d4ff',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#555' } }
                }
            }
        });

        // --- App Logic ---
        let currentPrice = 8421500;
        let wallet = 1450000;

        function updateMarket() {
            const vol = (Math.random() - 0.49) * 15000;
            currentPrice += vol;
            
            // UI Update
            document.getElementById('mainPrice').innerText = Math.floor(currentPrice).toLocaleString();
            const trend = document.getElementById('priceTrend');
            trend.innerHTML = vol > 0 ? `<i class="fas fa-caret-up"></i> +KES ${vol.toFixed(2)}` : `<i class="fas fa-caret-down"></i> -KES ${Math.abs(vol).toFixed(2)}`;
            trend.style.color = vol > 0 ? "var(--success)" : "var(--danger)";

            // Chart Update
            dataPoints.push(currentPrice);
            dataPoints.shift();
            chart.update('none');

            if (Math.abs(vol) > 8000) playSound('tick');
        }

        function handleTrade(type) {
            const amount = 50000; // Fixed trade for demo
            if (type === 'BUY') {
                wallet -= amount;
                playSound('buy');
            } else {
                wallet += amount;
                playSound('sell');
            }
            
            // Update Wallet
            document.getElementById('walletBal').innerText = `KES ${wallet.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            
            // Add Log
            const logs = document.getElementById('tradeLogs');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span style="color:${type==='BUY'?'var(--success)':'var(--danger)'}">${type} EXEC</span> <span>KES ${amount.toLocaleString()}</span>`;
            logs.prepend(item);
            if(logs.children.length > 8) logs.lastChild.remove();
        }

        setInterval(updateMarket, 800);
    </script>
</body>
    </html>
