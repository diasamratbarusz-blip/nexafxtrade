<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexafxtrade | Secure Terminal Hub</title>
    <!-- Tailwind CSS for modern, clean styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Subtle dark gradient background for an institutional, fintech feel */
        body {
            background: radial-gradient(circle at top right, #111827, #030712);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-100 font-sans antialiased px-4">

    <div class="w-full max-w-md bg-gray-900/40 backdrop-blur-md border border-gray-800 p-8 rounded-2xl shadow-2xl space-y-8">
        
        <!-- Header / Branding -->
        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600/10 border border-blue-500/30 text-blue-400 mb-2">
                <!-- Simple Technical/Institutional Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">
                Trader Gateway Dashboard
            </h1>
            <p class="text-sm text-gray-400 leading-relaxed max-w-xs mx-auto">
                Welcome to <span class="text-blue-400 font-medium">Nexafxtrade</span> Secure Terminal Hub. Choose an option below to enter your institutional portal account layout.
            </p>
        </div>

        <hr class="border-gray-800/80">

        <!-- Action Options -->
        <div class="space-y-4">
            <!-- Login Link/Button -->
            <a href="/login" class="flex items-center justify-center w-full py-3 px-4 text-sm font-semibold rounded-xl text-white bg-blue-600 hover:bg-blue-500 transition-all duration-200 shadow-lg shadow-blue-600/20 text-center architecture-btn">
                Already Registered? Login
            </a>

            <!-- Create Account Link/Button -->
            <a href="/register" class="flex items-center justify-center w-full py-3 px-4 text-sm font-semibold rounded-xl text-gray-300 bg-gray-800/80 hover:bg-gray-800 hover:text-white border border-gray-700/60 transition-all duration-200 text-center">
                New Trader? Create Account
            </a>
        </div>

        <!-- Footer Security Note -->
        <div class="text-center">
            <p class="text-[11px] text-gray-500 tracking-wider uppercase flex items-center justify-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3.5 h-3.5 text-emerald-500">
                    <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 shadow-none-0-6 3 3 0 0 0 3 3V9h-6Z" clip-rule="evenodd" />
                </svg>
                Encrypted Institutional Access
            </p>
        </div>

    </div>

</body>
</html>
